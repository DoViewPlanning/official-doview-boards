/* two intermediate traffic-light states rendered as vertically split circles. greenYellow = left half green, right half yellow; yellowRed = left half yellow, right half red. Used everywhere a single-color fill would otherwise be set inline (the on-box .tl-dot, the details-pane .tl-dot-btn picker, and the on-box .tl-opt chooser). The split renders as a half-width linear gradient with hard stops at 50%, so the dot still reads as one circle at small sizes. The class is applied via a small switch in the rendering helpers; existing bare 'green'/'yellow'/'red'/'grey' values remain rendered as solid fills via their inline backgrounds. */
.tl-split-gy{background:linear-gradient(90deg,#2ECC71 0 50%,#F5A623 50% 100%)!important}

/* compact preset row for the per-box Border color control in the details pane. Sits next to Status (traffic light) and Priority. Each swatch is a small circle with the preset color as its background plus a thin neutral outline; the Default option uses a transparent fill with a dashed neutral outline so it reads clearly as "no custom border". The active preset gets a stronger inner border so it stands out without changing layout. Read-only mode hides the whole .ep-controls row's editing affordances via existing rules; see body.is-readonly .ep-struct{display:none} which already hides the entry panel structural area, and the per-box border color stays visible because it is rendered on the box itself. */

.pri-btn.pri-a{background:#0f172a;color:#fff;border-color:#0f172a}.pri-btn.pri-b{background:#334155;color:#fff;border-color:#334155}.pri-btn.pri-c{background:#64748b;color:#fff;border-color:#64748b}.pri-btn.pri-d{background:#cbd5e1;color:#1e293b;border-color:#cbd5e1}.pri-btn.pri-e{background:#e2e8f0;color:#334155;border-color:#cbd5e1}.pri-btn.pri-bau{background:#f8fafc;color:#334155;border-color:#94a3b8}

.box.box-selected{border:2px solid #1e293b!important;box-shadow:0 0 0 2px rgba(30,41,59,0.10),0 2px 8px rgba(0,0,0,0.10)!important;z-index:3}

/* tooltip-bearing hover overlays for the small black reveal/link arrows. The arrows themselves are CSS pseudo-elements (::before / ::after) and cannot carry a title attribute, so these transparent overlay spans sit over the arrow area and carry the side-specific title tooltips. The overlays also cover the optional link traffic-light dot and remain outside the count-badge zone. */

/* read-only copy styling. The .is-readonly class is applied to <body> when the board is loaded from an embedded state carrying isReadonly:true. It hides edit-oriented controls throughout the UI while preserving navigation, search, print, view settings, and other viewing functions. Keep modest \u2014 a small outline pill label near the board title, dimmed/hidden buttons, and hidden chat. Non-alarmist styling. */
/* Read-only copy label was previously rendered inside .hdr-right above the tagline as a translucent outline pill. */
/* the Read-Only Copy label is moved back to the left side of the header, rendered left-justified directly under the board title inside .hdr-title-wrap. The styling is intentionally modest \u2014 small, low-contrast, single line, no pill, no uppercase spacing, no warning-banner appearance \u2014 so it reads as a quiet mode indicator rather than a security guarantee. The honest tooltip clarifies that read-only copies are a UI-only restriction and not security protection. */
/* the Read-Only label is restyled as a modest pill and moved inline with the top utility links (alongside Board info, Measures, \u2026, Get training) rather than sitting under the title. The label text is "Read-Only Board" and reads as a status pill, not a clickable link or a warning banner. The font size is slightly larger than the previous tiny label so it stands out modestly without dominating; the subtle white outline + transparent background and small horizontal padding give it pill shape; cursor:help signals hover reveals the tooltip; user-select:none makes it feel like a status, not text. The honest tooltip remains unchanged ("Editing is disabled through the board interface. This is not security protection; someone with technical skills could still edit the HTML."). Display is gated by body.is-readonly so editable boards never show it. */
.ro-label{display:none;font-size:12px;color:#1e293b;font-weight:700;line-height:1.2;white-space:nowrap;padding:6px 12px;letter-spacing:0.1px;text-transform:none;background:#fff7ed;border:1.5px solid #fed7aa;border-radius:999px;cursor:help;user-select:none;align-self:center}
body.is-readonly .ro-label{display:inline-flex;align-items:center;justify-content:center}
/* in read-only Presentation View, the read-only status pill is also shown in the presentation top bar immediately to the left of Normal View. */
.presentation-bar .ro-label{margin-right:2px;color:#1e293b;background:#fff7ed;border-color:#fed7aa}
.tag-validation{display:none;color:#b91c1c;background:#fef2f2;border:1px solid #fecaca;border-radius:6px;padding:7px 9px;font-size:12px;line-height:1.35;margin-top:7px;font-weight:600}
body.is-readonly .chat-fab,body.is-readonly .chat-panel,body.is-readonly .mobile-chat-btn{display:none!important}
body.is-readonly #saveBtn2,body.is-readonly #newBoardBtn,body.is-readonly #createReadOnlyCopyBtn{display:none!important}
body.is-readonly .how-add-btn{display:none!important}
body.is-readonly .ep-struct{display:none!important}

body.is-readonly .ep-controls-edit,body.is-readonly .ep-add,body.is-readonly #epTa,body.is-readonly .ep-acts,body.is-readonly .tt-link-add{display:none!important}
body.is-readonly .tab-add-btn{display:none!important}
body.is-readonly .pi-link[onclick*="movePageLeft"],body.is-readonly .pi-link[onclick*="confirmDeletePage"],body.is-readonly .pi-undo,body.is-readonly .pi-link[onclick*="openPageInfo"]{display:none!important}

body.is-readonly .how-level-controls{display:none!important}
body.is-readonly .ep-edit{display:none!important}

body.is-readonly button[onclick="saveBoardInfo()"],body.is-readonly button[onclick="savePageInfo()"],body.is-readonly button[onclick="saveMeasureDetail()"],body.is-readonly button[onclick="saveEQDetail()"],body.is-readonly button[onclick="saveLinkDetail()"],body.is-readonly button[onclick="doInsertClone()"],body.is-readonly button[onclick="saveTopRightText()"],body.is-readonly button[onclick="clearTopRightText()"],body.is-readonly button[onclick="saveBoxDisplayTextPopup()"],body.is-readonly button[onclick="saveLinkDisplayTextPopup()"],body.is-readonly button[onclick="saveMEQDisplayTextEditor()"]{display:none!important}
/* in read-only copies, Board info / Page info open in rendered view mode only. The Edit and Cancel buttons (which would expose the textarea + Save) are hidden, so the popup shows only the rendered view of the saved text plus the Close button. URLs in the rendered view remain clickable. */
body.is-readonly button[onclick="boardInfoStartEdit()"],body.is-readonly button[onclick="boardInfoCancelEdit()"],body.is-readonly button[onclick="pageInfoStartEdit()"],body.is-readonly button[onclick="pageInfoCancelEdit()"]{display:none!important}
body.is-readonly .meq-reg-toolbar,body.is-readonly .meq-footer,body.is-readonly .meq-add,body.is-readonly .how-link-add,body.is-readonly .ep-sbtn.ep-del,body.is-readonly .meq-item-rm,body.is-readonly .tt-link-rm,body.is-readonly .how-link-rm,body.is-readonly .doc-clone-rm,body.is-readonly .src-ref-close{display:none!important}

/* in a read-only copy, popup textareas and text inputs are made non-editable via the readOnly attribute set by applyReadonlyToModal() (called from openModal). These CSS rules back that up with visual styling that reads as non-editable at a glance \u2014 dimmed background, default (non-text) cursor, neutralised focus ring \u2014 so the UI does not imply editability when none is possible. Contenteditable regions (such as the doc-page editor, should it ever render in read-only mode) are also visually locked down. Search/filename inputs are excluded via the .ro-keep-editable escape hatch so viewing/filtering inputs still feel live. */

/* coherent non-box UI scaling. The board area (.main) already uses zoom:var(--board-scale) so boxes and on-board chrome (page bars, under-box details, etc.) scale together. Previously, the non-box UI/chrome sat outside .main at 1x, so header/tab-bar/page-info-bar/control-bar/attribution and all popups/modals/tooltip/save-toast/chat elements felt disproportionately small once the board was scaled. Each of these containers now participates in the same scaling logic via zoom:var(--board-scale), so the whole interface scales together. For fixed-size popups/modals/tooltip/chat panel, max-width/max-height/width/height are divided by --board-scale so their visible on-screen footprint stays consistent with pre-fix behavior while internal text scales coherently. The on-board box-chooser popup is appended inside #main and therefore keeps inheriting .main's zoom as before — no change needed. CSS zoom is already in use for .main, so relying on zoom here is consistent with the existing approach and avoids scattering many per-element font-size tweaks. */
/* Main popup/modal scaling is decoupled from board scale so popup text remains readable while the board is zoomed. */
/* main popup/modal width base increased from 820px to 1200px (still divided by --popup-scale) so the full popup is visible without sideways truncation and right-side controls such as Add are reachable without horizontal scrolling. Only .modal-box max-width changes here — --popup-scale itself is unchanged, .meq-detail-modal .modal-box and .ptc-box keep their existing max-width bases, and the popup heading size change lives with the .modal-box h3 rule earlier in the CSS. */
.hdr{zoom:var(--board-scale)}
.tab-bar{zoom:var(--board-scale)}
.page-info-bar{zoom:var(--board-scale)}
.ctrl-bar{zoom:var(--board-scale)}
.attr{zoom:var(--board-scale)}
.modal-box{zoom:var(--popup-scale);max-width:calc(1200px / var(--popup-scale));max-height:calc(82vh / var(--popup-scale))}
.meq-detail-modal .modal-box{max-width:calc(520px / var(--popup-scale))}
.ptc-box{zoom:var(--popup-scale);max-width:calc(400px / var(--popup-scale))}
#howPageTypeChooser .ptc-box{max-width:calc(680px / var(--popup-scale));max-height:calc(86vh / var(--popup-scale));overflow-y:auto}
.dv-tip{zoom:var(--board-scale);max-width:calc(280px / var(--board-scale))}
.save-toast{zoom:var(--board-scale)}
.chat-fab{zoom:var(--board-scale)}
.chat-panel{zoom:var(--board-scale);width:calc(500px / var(--board-scale));max-width:calc((100vw - 44px) / var(--board-scale));height:calc(620px / var(--board-scale));max-height:calc((100vh - 165px) / var(--board-scale))}

}
/* inner detail/edit popup content width fix. Previously the outer .modal-box was widened and the inline detail/entry panel (.ep) was rendered inside #epWrap inside .main, but the inner .ep panel had no explicit width and some inner rows (.ep-add, .ep-struct, .meq-add) could push right-side controls such as Add off the visible area, requiring horizontal scrolling. The fix targets only the inner edit/detail popup content: .ep is forced to use the available width with width:100% and max-width:none; .ep-ta is reinforced at width:100% (already so); .ep-add and .ep-struct keep their existing flex-wrap:wrap and now also have max-width:100% so they wrap rather than overflow; .meq-add (the picker+Add row inside Measure/Evaluation Question/Link detail modals) gets flex-wrap:wrap + max-width:100% for the same reason; .meq-section (parent of meq-add and meq-item rows) is constrained to max-width:100%. No outer modal width change here — that lives with the .modal-box rule earlier. No popup-scale change. No board-scale change. No schema, state, link, read-only, or interaction changes. */
.ep{width:100%;max-width:none}
.ep-ta{width:100%}
.ep-add{flex-wrap:wrap;max-width:100%}
.ep-struct{flex-wrap:wrap;max-width:100%}
.meq-add{flex-wrap:wrap;max-width:100%}
.meq-section{max-width:100%}
/* This–Then / How link popup overflow. The .ep / detail-panel rules above targeted those classes, but the remaining overflow problem was specifically the This–Then / How link popup, where the inner row containing the dropdown/select and the Add button could still push the Add button off to the right and require horizontal scrolling. The fix targets the actual link-popup rows (the .tt-link-add and .how-link-add rows used by buildTTLinkPicker, buildHowActingOnPicker, buildHowLinkTTPicker, buildHowLinkHowPicker, buildLateralHowOnTTPopupPicker, etc., plus the .meq-add picker+Add rows used inside the Link detail popup buildLinkMeasuresSection / buildLinkEQSection): .tt-link-add and .how-link-add now have flex-wrap:wrap + max-width:100% (parallel to the .ep-add / .ep-struct / .meq-add rules) so they wrap rather than overflow at narrow widths; .tt-link-section and .how-link-section are constrained to max-width:100% as their containers; and .tt-link-sel, .how-link-sel, and .meq-sel get min-width:0 + max-width:100% so the select itself can shrink below its widest option text rather than forcing the row wider than its container — without min-width:0, a flex item's default min-width:auto resolves to min-content and prevents shrink even with flex:1 + flex-shrink:1. No outer modal width change; no popup-scale change beyond the default board-scale change in :root; no schema, state, link, read-only, or interaction changes. */
.tt-link-add{flex-wrap:wrap;max-width:100%}
.how-link-add{flex-wrap:wrap;max-width:100%}
.tt-link-section{max-width:100%}
.how-link-section{max-width:100%}
.tt-link-sel{min-width:0;max-width:100%}
.how-link-sel{min-width:0;max-width:100%}
.meq-sel{min-width:0;max-width:100%}
/* board-level Top right text styling for the page-info bar. The page-info bar's left content stays as-is in #pageInfoBarLeft; #pageInfoBarRight floats to the right and right-aligns the optional Top right text or the modest "+ Add top right text" affordance shown when no Top right text exists. The Top right text is plain text only (no rich text, no links). Truncated with ellipsis and capped at a sensible max-width so long text does not crowd out page controls on narrow viewports. In read-only copies the text is visible (via the same .pi-right-text class) but the click handler is gated by IS_READONLY so it cannot be edited. The "+ Add top right text" affordance is hidden in read-only copies via body.is-readonly. */
.pi-bar-flex{display:flex;align-items:center;gap:6px;width:100%}
.pi-bar-left{flex:1;min-width:0}
.pi-bar-right{margin-left:auto;display:flex;align-items:center;gap:6px;flex-shrink:0;text-align:right;justify-content:flex-end}

<div class="modal-ov" id="infoModal"><div class="modal-box"><h3>Info for developers</h3><p style="font-size:14px;line-height:1.7;color:var(--text2)">DoView boards are a proven approach to planning that can be adapted to any topic, context, or scale, and are shaped by thousands of real-world applications. Behind the simplicity of the This–Then layout is a robust conceptual foundation in outcomes theory, helping ensure that what gets built is not just visually clear but analytically sound.<br><br>The main website for DoView Boards and DoView Planning is <a href="https://doviewplanning.org" target="_blank" rel="noopener noreferrer">DoViewPlanning.org</a>. You can find information about the approach and many examples of boards there. You can find our GitHub at <a href="https://doviewplanning.org/doviewboards" target="_blank" rel="noopener noreferrer">DoViewPlanning.org/DoViewBoards</a>. It includes the DoView Board minimum specification, developer integration guidance, configuration reference material, and other resources for building DoView-compatible boards, apps, platforms, and systems.<br><br>Developers are encouraged to implement, extend, and build DoView-compatible boards within any app, platform, or system, with acknowledgment. Details are at <a href="https://doviewplanning.org/trademarkuse" target="_blank" rel="noopener noreferrer">DoViewPlanning.org/trademarkuse</a>.<br><br>The GitHub also includes the example reference JavaScript engine that created this DoView Board, a prompt for building PowerPoint DoViews, our Gartner Cool Vendor award-winning DoView legacy app, examples of DoView Boards, and other resources.<br><br>Thinking more broadly, DoView Boards could potentially be used as a GUI “intent engineering” interface for building and controlling agentic systems, and perhaps by agentic systems themselves to plan and coordinate their activity if you want to develop them further in this direction.<br><br>DoViews are drawn to a specific standard so they are fit for purpose, as set out in the DoView Boards minimum standard. Please follow this basic standard for how DoView Boards are structured and presented, and innovate as much as you like on top of it. If you put DoView Boards into any app, platform, or system, please let us know if you are able.<br><br>The Official DoView® Badge: Standards-Compliant Board Structure is separate from general DoView-compatible use. If you want your app, platform, or system to use the Official DoView® Badge, please contact us at <a href="https://doviewplanning.org/contact" target="_blank" rel="noopener noreferrer">DoViewPlanning.org/contact</a>.<br><br>If you want conceptual help implementing or extending DoView Boards, please contact us through <a href="https://doviewplanning.org" target="_blank" rel="noopener noreferrer">DoViewPlanning.org</a>. You can also see projects where we would like to collaborate with developers at <a href="https://doviewplanning.org/collaborate" target="_blank" rel="noopener noreferrer">DoViewPlanning.org/collaborate</a>.</p><button class="modal-close" onclick="closeModal('infoModal')">Close</button></div></div>

<div class="modal-ov" id="saveDownloadModal"><div class="modal-box" style="max-width:640px"><h3>Save your DoView Board</h3><div id="saveDownloadOptions"><p class="save-workflow-intro">Because a DoView Board is a single HTML file, saving works somewhat differently from a traditional app. Use one of the options below depending on your browser.</p><p class="warn-txt"><strong>Do not use your browser’s File &gt; Save Page As…</strong></p><div class="save-options"><div class="save-option" id="savePickerOption"><h4>Save to a File You Choose</h4><div class="save-option-sub">(if supported by your browser, e.g. Chrome or Edge)</div><p>This saves to the .html file you choose. <strong>It is essential that you check you are choosing the right folder and using the right filename.</strong></p><p class="save-current-file" id="saveCurrentFile" style="display:none"></p><div class="save-option-actions"><button class="cbtn cbtn-or" id="savePickerBtn" onclick="saveBoardToChosenFile()">Save to a File You Choose</button><button class="cbtn cbtn-ol" id="chooseDifferentFileBtn" onclick="chooseDifferentSaveFile()" style="display:none">Choose a Different File</button><span class="save-option-note" id="savePickerNote"></span></div></div><div class="save-option" id="downloadCopyOption"><h4>Download a New Copy</h4><p>This works in supported browsers. It downloads a new saved .html copy, usually to your Downloads folder or to another folder chosen by your browser settings.</p><p class="warn-txt">After the download finishes, <strong>you must open the newly downloaded .html file before you continue editing</strong>. Then close this tab so you do not accidentally work in two separate copies of the board.</p><p>When you finish, find the most recent saved .html file, for example in Downloads, and <strong>move it to the folder where you want to keep and open the board next time</strong>.</p><div class="save-option-actions"><button class="cbtn cbtn-ol" id="downloadCopyBtn" onclick="downloadBoardFromSave hooser()">Cancel</div></div></div>

<div class="modal-ov" id="newBoardModal"><div class="modal-box" style="max-width:640px"><h3>Create and save a new empty DoView Board</h3><div id="newBoardOptions"><p class="save-workflow-intro">This will create a separate new empty DoView Board as a standalone .html file. Choose how you want to save the new board.</p><p class="warn-txt"><strong>Do not use your browser’s File &gt; Save Page As…</strong></p><div class="set-fld" style="margin-top:4px;margin-bottom:12px"><label style="font-size:12.5px;font-weight:600;color:var(--text2);margin-bottom:4px;display:block">New board name</label><input type="text" id="newBoardFilename" style="width:100%;border:1px solid var(--bdr);border-radius:7px;padding:7px 10px;font-size:13px;box-sizing:border-box" placeholder="Untitled DoView Board"></div><div class="save-current-file" id="newBoardMessage" style="display:none;margin-top:0"></div><div class="save-options"><div class="save-option" id="newBoardSavePickerOption"><h4>Save to a File You Choose</h4><div class="save-option-sub">(if supported by your browser, e.g. Chrome or Edge)</div><p>This saves the new empty board to the .html file you choose. <strong>It is essential that you check you are choosing the right folder and using the right filename.</strong></p><div class="save-option-actions"><button class="cbtn cbtn-or" id="newBoardSavePickerBtn" onclick="saveNewEmptyBoardToChosenFile()">Save New Empty Board to a File You Choose</button><span class="save-option-note" id="newBoardSavePickerNote"></span></div></div><div class="save-option" id="newBoardDownloadOption"><h4>Download a New Empty Board</h4><p>This works in supported browsers. It downloads a separate new empty saved .html board, usually to your Downloads folder or to another folder chosen by your browser settings.</p><p class="warn-txt">After the download finishes, <strong>open the newly downloaded .html file when you want to start editing the new board</strong>. Your current board can stay open if you still need it.</p><div class="save-option-actions"><button class="cbtn cbtn-ol" id="newBoardDownloadBtn" onclick="downloadNewEmptyBoardFromModal()">Download a New Empty Board</button></div></div></div></div><div id="newBoardResult" class="save-result"></div><div id="newBoardModalFooter"><button class="modal-close" style="background:var(--text2)" onclick="closeModal('newBoardModal')">Close</button></div></div></div>

    <strong style="font-size:13px">⚙️ AI Connection Settings</strong>
    <div class="disclaim">Board Chat is optional. The board works without it. Sending a Board Chat message may send board content to the custom AI endpoint you configure, using the API key or session credential you enter for this session. If privacy, confidentiality, security, compliance, API-key handling, or external data sharing is a concern, do not use Board Chat.</div>

/* docInsertLink previously took whatever the user typed in the prompt() and passed it directly to document.execCommand('createLink'); a user typing JavaScript:alert(1) would have produced a clickable JavaScript: anchor in the saved Documentation Page content. The entered URL is now resolved through the _safeUrl helper and the createLink command is only run when _safeUrl returns a safe URL. Unsafe / blank URLs are rejected with a small alert so the user knows the link was not created. The contenteditable HTML editor's safe display path (linkifyDocHtml, which walks text nodes, escapes, then linkifies) is unchanged. Stored Documentation Page content is not rewritten. */

function resolveCloneText(type,key){

  if(type==='box_title'){const b=B[key];return b?b.label:null;}
  if(type==='box_main_text'){const b=B[key];return b?(b.label+': '+(b.detailText||'(no display text)')):null;}

  else if(cmd==='addSubpage'&&parts.length>=2){const wasSingle=SP.length===1;const label=parts[1];let pType='this_then';if(parts.length>=3&&!parts[2].startsWith('#')&&['this_then','how','documentation'].includes(parts[2])){pType=parts[2];}let bg,bdr,tab;const colorStart=pType!=='this_then'?3:2;if(parts.length>=colorStart+3){const avail=nextAutoPageColor();bg=sanitizeColorValue(parts[colorStart],avail.bg);bdr=sanitizeColorValue(parts[colorStart+1],avail.bdr);tab=sanitizeColorValue(parts[colorStart+2],avail.tab);}else{const avail=nextAutoPageColor();bg=avail.bg;bdr=avail.bdr;tab=avail.tab;}const id=nextUnusedPageId();/* stable uid on the new page. */const _pageUid=_genUid('page');if(pType==='how'){const howBoxes=[];for(let i=1;i<=8;i++){const hid='H'+String(i).padStart(3,'0');/* stable uid on each starter How Box record. */howBoxes.push({id:hid,label:'How (action, person, team, unit, organization, capability, \u2026)',uid:_genUid('box')});}SP.push({id,label,pageType:'how',color:{bg,bdr,tab},cols:[],howBoxes,nextHowNum:9,howLevel:nextVerticalHowLevel(),uid:_pageUid});howBoxes.forEach(hb=>{B[`${id}-${hb.id}`]={label:hb.label,light:'',entries:[],priority:'',hasSubpage:false,detailText:'',borderColor:'',boxColor:'',tagIds:[],uid:hb.uid};});}else{/* stable uid on the default first column of a new this_then / documentation page. */SP.push({id,label,pageType:pType,color:{bg,bdr,tab},cols:[{h:'First Stage',boxes:[],uid:_genUid('col')}],uid:_pageUid});}if(wasSingle){addChatMsg('system','This is now a multi-page board. The overview page has been added and the original page now uses a single color scheme to match the overview tiles.');currentPage='overview';}buildDepsMap();saveState();render();}

function rebuildBoxKeys(spId,keyMap){markRuntimeLinkIndexDirty();const sp=SP.find(s=>s.id===spId);if(!sp)return;if(keyMap&&typeof keyMap==='object'){const captured={};Object.keys(B).filter(k=>k.indexOf(spId+'-c')===0).forEach(k=>{captured[k]=B[k];delete B[k];});Object.keys(captured).forEach(oldK=>{let newK;if(Object.prototype.hasOwnProperty.call(keyMap,oldK)){newK=keyMap[oldK];}else{newK=oldK;}if(newK===''||newK==null)return;B[newK]=captured[oldK];});sp.cols.forEach((col,ci)=>{col.boxes.forEach((label,bi)=>{const k=`${spId}-c${ci}-b${bi}`;if(!B[k])B[k]={label,light:'',entries:[],priority:'',hasSubpage:false,detailText:'',borderColor:'',boxColor:'',tagIds:[],uid:_genUid('box')};B[k].label=label;});});function _remap(k){if(k&&typeof k==='string'&&k.indexOf(spId+'-c')===0&&Object.prototype.hasOwnProperty.call(keyMap,k)){return keyMap[k];}return k;}if(typeof ttLinks!=='undefined'&&Array.isArray(ttLinks)){ttLinks.forEach(l=>{if(l&&l.from)l.from=_remap(l.from);if(l&&l.to)l.to=_remap(l.to);});ttLinks=ttLinks.filter(l=>l&&l.from&&l.to);}if(typeof howLinks!=='undefined'&&Array.isArray(howLinks)){howLinks.forEach(l=>{if(l&&l.from)l.from=_remap(l.from);if(l&&l.to)l.to=_remap(l.to);});howLinks=howLinks.filter(l=>l&&l.from&&l.to);}if(typeof openBox!=='undefined'&&openBox){const r=_remap(openBox);openBox=(r==='')?null:r;}if(typeof inspectHome!=='undefined'&&inspectHome){const r=_remap(inspectHome);inspectHome=(r==='')?null:r;}if(typeof revealBox!=='undefined'&&revealBox){const r=_remap(revealBox);revealBox=(r==='')?null:r;}if(typeof inspectLinkedKeys!=='undefined'&&Array.isArray(inspectLinkedKeys)){inspectLinkedKeys=inspectLinkedKeys.map(_remap).filter(k=>k);}if(typeof sourceRefBox!=='undefined'&&sourceRefBox&&sourceRefBox.sourceKey){const r=_remap(sourceRefBox.sourceKey);if(r!=='')sourceRefBox.sourceKey=r;}cleanupTTLinks();cleanupHowLinks();return;}const oldB={};Object.keys(B).filter(k=>k.startsWith(spId+'-')).forEach(k=>{oldB[k]=B[k];delete B[k];});sp.cols.forEach((col,ci)=>{col.boxes.forEach((label,bi)=>{const k=`${spId}-c${ci}-b${bi}`;const old=oldB[k];B[k]=old||{label,light:'',entries:[],priority:'',hasSubpage:false,detailText:'',borderColor:'',boxColor:'',tagIds:[]};B[k].label=label;});});cleanupTTLinks();cleanupHowLinks();}
function rebuildFinalKeys(){normalizeFinalOutcomesInMemory();const oldB={};Object.keys(B).filter(k=>k.startsWith('final-')).forEach(k=>{oldB[k]=B[k];delete B[k];});FO_DATA.forEach((label,i)=>{const k=`final-b${i}`;const old=oldB[k];B[k]=old||{label:label,light:'',entries:[],priority:'',hasSubpage:false,detailText:'',borderColor:'',boxColor:'',measures:[],evalQuestions:[],tagIds:[]};B[k].label=label;});}
function rebuildFinalKeysWithMap(keyMap){markRuntimeLinkIndexDirty();normalizeFinalOutcomesInMemory();const captured={};Object.keys(B).filter(k=>k.startsWith('final-')).forEach(k=>{captured[k]=B[k];delete B[k];});Object.keys(captured).forEach(oldK=>{let newK;if(keyMap&&Object.prototype.hasOwnProperty.call(keyMap,oldK)){newK=keyMap[oldK];}else{newK=oldK;}if(newK===''||newK==null)return;B[newK]=captured[oldK];});FO_DATA.forEach((label,i)=>{const k=`final-b${i}`;if(!B[k])B[k]={label:label,light:'',entries:[],priority:'',hasSubpage:false,detailText:'',borderColor:'',boxColor:'',measures:[],evalQuestions:[],tagIds:[],uid:_genUid('final')};B[k].label=label;if(!Array.isArray(B[k].entries))B[k].entries=[];if(!Array.isArray(B[k].measures))B[k].measures=[];if(!Array.isArray(B[k].evalQuestions))B[k].evalQuestions=[];if(!Array.isArray(B[k].tagIds))B[k].tagIds=[];});function _remap(k){if(k&&typeof k==='string'&&k.startsWith('final-')&&keyMap&&Object.prototype.hasOwnProperty.call(keyMap,k)){return keyMap[k];}return k;}if(typeof openBox!=='undefined'&&openBox){const r=_remap(openBox);openBox=(r==='')?null:r;}if(typeof inspectHome!=='undefined'&&inspectHome){const r=_remap(inspectHome);inspectHome=(r==='')?null:r;}if(typeof revealBox!=='undefined'&&revealBox){const r=_remap(revealBox);revealBox=(r==='')?null:r;}if(typeof inspectLinkedKeys!=='undefined'&&Array.isArray(inspectLinkedKeys)){inspectLinkedKeys=inspectLinkedKeys.map(_remap).filter(k=>k);}if(typeof sourceRefBox!=='undefined'&&sourceRefBox&&sourceRefBox.sourceKey){const r=_remap(sourceRefBox.sourceKey);if(r){sourceRefBox.sourceKey=r;sourceRefBox.sourceLabel=B[r]?B[r].label:sourceRefBox.sourceLabel;}else{sourceRefBox=null;}}}

/* detect explicit blank/starter This\u2013Then page requests in the user's chat message. Returns true when the user clearly asks for a blank/starter/empty/shell page rather than a populated one. Used to bypass the populated-page validation so genuinely-blank requests still create a blank/starter page. */
function isBlankPageRequest(msg){if(!msg)return false;return /\b(blank|starter|empty|shell|skeleton)\b/i.test(msg);}

/* detect populated This\u2013Then page requests in the user's chat message. Returns true when the user is asking for a populated/filled-in This\u2013Then page about a topic. The trigger phrasings cover the common cases: "populate it", "add DoView this-then boxes", "create a this-then logic for X", "add a this-then page", and "add a page and fill it in". This also includes "full DoView", "complete DoView", "full logic", and "full populated page" so phrasings such as "add a new page called X which includes a full DoView on it" reliably propose a populated This\u2013Then page. It also removes the previous broad "add a page about X" matcher (without an explicit this-then keyword or populated trigger) so a bare "add a page about X" is now classified as ambiguous (see isAmbiguousPageCreationRequest) and asks for the page type instead. It also extends phrase coverage further so common informal phrasings reliably propose a populated This\u2013Then page when the intent is clear: "do/make the full map (for X)", "map this out", "build out (a/this) page", "fill out this page", "build the full logic", and "turn this into a full page". Tight phrasings only \u2014 the broad word "map" by itself, or "section" by itself, do NOT trigger; question-only requests are NOT triggered. An explicit blank/starter request short-circuits to false so a clearly-blank request bypasses populated-page validation. Used by processAIResponse to validate that the AI's proposed structural actions actually populate the new page rather than leaving it as a one-box placeholder. */
function isPopulatedThisThenPageRequest(msg){if(!msg)return false;if(isBlankPageRequest(msg))return false;if(/\bpopulate\b/i.test(msg))return true;if(/\bfill\s+(it|in|out|the\s+page|out\s+this\s+page)\b/i.test(msg))return true;/* "full DoView" / "complete DoView" / "full logic" / "full populated page" all trigger populated This\u2013Then page behavior. */if(/\b(full|complete)\s+doview\b/i.test(msg))return true;if(/\bfull\s+(logic|populated\s+page|populated)\b/i.test(msg))return true;/* "build the full logic" (a non-noun-form alternative to "full logic") also triggers populated. */if(/\bbuild\s+(the\s+|a\s+)?full\s+logic\b/i.test(msg))return true;/* "do the full map" / "make the full map" / "the full map for X" trigger populated. The bare word "map" by itself does NOT trigger \u2014 it must be preceded by "do/make/build the full" or be the verb in "map this out". */if(/\b(do|make|build)\s+(the\s+|a\s+)?full\s+map\b/i.test(msg))return true;if(/\bmap\s+(this|it|that)\s+out\b/i.test(msg))return true;/* "build out (a/this/the) page", "fill out this page", "turn this into a full page" trigger populated. These phrasings are about populating a page, not just creating a shell. */if(/\bbuild\s+out\s+(a\s+|an\s+|the\s+|this\s+)?page\b/i.test(msg))return true;if(/\bturn\s+(this|it|that)\s+into\s+(a\s+)?full\s+page\b/i.test(msg))return true;if(/\b(add|create|make)\s+(a\s+|an\s+)?(new\s+)?this[-\u2013\s]*then\s+page\b/i.test(msg))return true;if(/\bcreate\s+(a\s+|an\s+)?this[-\u2013\s]*then\s+(logic|page|flow)\b/i.test(msg))return true;if(/\badd\s+(doview\s+)?(this[-\u2013\s]*then\s+)?boxes\b/i.test(msg))return true;if(/\badd\s+(a\s+|an\s+)?(new\s+)?page\b.*\bfill\b/i.test(msg))return true;return false;}

/* detect generic page-creation phrasings in the user's chat message. Returns true when the user is asking to add/create/make a page (or "add X as a page"). Used together with isExplicitPageType, isBlankPageRequest, and isPopulatedThisThenPageRequest to decide whether a page-creation request is ambiguous and needs the page-type clarification question. Deliberately tight so it does not misfire on rename/delete/edit ("rename this page", "delete this page") or board-level commentary. It also detects "make/add another tab", "set up a section (for X)", "build out (a/this/the) page", and "turn this into a full page" so common informal page-creation phrasings are recognised. Tight phrasings only \u2014 the bare word "section" or "tab" or "map" does NOT trigger; questions like "what does this map say about X" do NOT trigger. */
function isPageCreationRequest(msg){if(!msg)return false;if(/\b(add|create|make)\s+(a\s+|an\s+)([a-z\u2013-]+\s+){0,3}page\b/i.test(msg))return true;if(/\b(add|create|make)\s+(a\s+|an\s+)?new\s+([a-z\u2013-]+\s+){0,3}page\b/i.test(msg))return true;if(/\bnew\s+(this[-\u2013\s]*then|how|documentation|doc)\s+page\b/i.test(msg))return true;if(/\bas\s+a\s+(new\s+)?(this[-\u2013\s]*then|how|documentation|doc)?\s*page\b/i.test(msg))return true;/* "make another tab", "add another tab", "make a new tab" \u2014 page-creation by another name. */if(/\b(make|add|create)\s+(another|a\s+new|a)\s+tab\b/i.test(msg))return true;/* "set up a section (for X)" \u2014 ambiguous page-creation. The bare word "section" without "set up a" does NOT trigger. */if(/\bset\s+up\s+(a\s+|an\s+)?(new\s+)?section\b/i.test(msg))return true;/* "build out a/this/the page", "turn this into a full page" \u2014 also page-creation phrasings (these typically mean populated, but isPopulatedThisThenPageRequest will catch the populated intent and bypass the ambiguity check). */if(/\bbuild\s+out\s+(a\s+|an\s+|the\s+|this\s+)?page\b/i.test(msg))return true;if(/\bturn\s+(this|it|that)\s+into\s+(a\s+)?(full\s+)?page\b/i.test(msg))return true;return false;}

/* detect whether the user has explicitly stated which page type they want (This\u2013Then, How, or Documentation). Used by isAmbiguousPageCreationRequest. Includes common variants like "doc page", "this-then page", "this then page", "how page". */
function isExplicitPageType(msg){if(!msg)return false;if(/\bthis[-\u2013\s]*then\s+page\b/i.test(msg))return true;if(/\bhow\s+page\b/i.test(msg))return true;if(/\b(documentation|doc)\s+page\b/i.test(msg))return true;return false;}

/* detect ambiguous page-creation requests where the user has asked to add/create/make a page but has NOT specified which page type they want and has NOT clearly implied a populated This\u2013Then page (via "full DoView", "populate it", etc.). Examples that should be classified as ambiguous: "add a page called leadership development", "create a new page about leadership development", "make a page for leadership development", "add leadership development as a page". Examples that are NOT ambiguous: "add a How page called X" (explicit type), "add a blank This\u2013Then page" (explicit type with blank qualifier), "add a complete DoView page about X" (populated trigger), "add a full populated page about X" (populated trigger). Note: a blank request without an explicit page type ("add a starter page called X") is still ambiguous because the page type is missing \u2014 the AI must ask which type before creating. Used by processAIResponse to reject any addSubpage emitted for an ambiguous request before queuing pendingStructural so no page is silently created. */
function isAmbiguousPageCreationRequest(msg){if(!msg)return false;if(!isPageCreationRequest(msg))return false;if(isExplicitPageType(msg))return false;if(isPopulatedThisThenPageRequest(msg))return false;return true;}

/* pick the page type from an addSubpage action array. Mirrors the parsing in execAction's addSubpage branch so validation and summary stay consistent with apply behavior. Defaults to this_then. */
function _pageTypeFromAddSubpage(a){if(!a||a[0]!=='addSubpage')return 'this_then';if(a.length>=3 && a[2] && a[2].charAt(0)!=='#' && ['this_then','how','documentation'].indexOf(a[2])>=0)return a[2];return 'this_then';}

/* , walk the structural actions array and predict the new page id assigned by execAction's addSubpage branch. New ids use the next unused pN value, not the current page count alone, so deleted pages do not cause id collisions. Returns an array of {action, predictedId, pageType} entries, one per addSubpage in order. */
function _predictNewPageIds(structActions){var out=[];var used={};(SP||[]).forEach(function(sp){if(sp&&sp.id)used[sp.id]=true;});structActions.forEach(function(a){if(a[0]==='addSubpage'){var pType=_pageTypeFromAddSubpage(a);var id=nextUnusedPageId(used);used[id]=true;out.push({action:a,predictedId:id,pageType:pType});}});return out;}

/* preflight validation for an entire action set before anything is applied. Performs a dry-run over a working "shadow" model that mirrors the parts of execAction's behavior that affect target resolution: addSubpage adds a new page with the next predicted id (and a default first column "First Stage" for this_then / documentation, no columns for how pages); addColumn / removeColumn / moveColumn updates the working column list; addBox / removeBox updates the working box list (and renumbers indices because rebuildBoxKeys does the same on apply); addFinalOutcome / removeFinalOutcome updates the working FO list; createMeasure / createEQ / deleteMeasure / deleteEQ updates the working measure / EQ id list; addTTLink / addHowLink / removeTTLink / removeHowLink updates working link id maps. The validator does NOT execute real actions; it only checks that every action references a valid object (existing in the current state OR created earlier in the same set), that page types are supported (this_then, how, documentation), that column indices are valid for the resolved page, that new labels/headings are non-empty, that addBox actions have valid page+column targets, that the action's parts.length meets CMD_MIN_PARTS for that command, and that the command name appears in SUPPORTED_CMDS. Returns {ok:true} or {ok:false, message:'...'}. The message is plain-language; never a stack trace or raw internal error. */
function _validateActionSet(actions){
  if(!Array.isArray(actions)||!actions.length)return {ok:true};
  // Working shadow state. We model only the parts of execAction that affect target resolution.
  var W={
    pages:{},  // pid -> {pageType, cols:[{h, boxes:[label,...]}], howIds:[h001,...], finalRm:false}
    pageOrder:[],  // pids in order
    fo:FO_DATA.slice(),  // list of labels (positions used as bI)
    measures:measures.map(function(m){return m.id;}),
    eqs:evalQuestions.map(function(q){return q.id;}),
    ttLinkIds:ttLinks.map(function(l){return l.id;}),
    howLinkIds:howLinks.map(function(l){return l.id;})
  };
  // Seed W.pages from current SP
  SP.forEach(function(sp){
    var entry={pageType:sp.pageType||'this_then',cols:[],howIds:[]};
    if(entry.pageType==='how'){if(sp.howBoxes)entry.howIds=sp.howBoxes.map(function(h){return h.id;});}
    else{(sp.cols||[]).forEach(function(col){entry.cols.push({h:col.h,boxes:(col.boxes||[]).slice()});});}
    W.pages[sp.id]=entry;W.pageOrder.push(sp.id);
  });
  function pageExists(pid){return !!W.pages[pid];}
  function nextShadowPageId(){var n=((SP&&SP.length)||0)+1;while(W.pages['p'+n])n++;return 'p'+n;}
  function resolveBoxKey(k){
    if(!k)return null;
    var m=k.match(/^(p\d+)-c(\d+)-b(\d+)$/);
    if(m){var pid=m[1],ci=parseInt(m[2]),bi=parseInt(m[3]);var pg=W.pages[pid];if(!pg||pg.pageType==='how')return null;if(!pg.cols[ci])return null;if(pg.cols[ci].boxes[bi]===undefined)return null;return {kind:'tt',pid:pid,ci:ci,bi:bi};}
    var hm=k.match(/^(p\d+)-(H\d{3,})$/);
    if(hm){var pid2=hm[1],hid=hm[2];var pg2=W.pages[pid2];if(!pg2||pg2.pageType!=='how')return null;if(pg2.howIds.indexOf(hid)<0)return null;return {kind:'how',pid:pid2,hid:hid};}
    var fm=k.match(/^final-b(\d+)$/);
    if(fm){var i=parseInt(fm[1]);if(i<0||i>=W.fo.length)return null;return {kind:'final',fi:i};}
    return null;
  }
  for(var idx=0;idx<actions.length;idx++){
    var a=actions[idx];if(!Array.isArray(a)||!a.length)return {ok:false,message:'I could not apply that change because the action format was incomplete or malformed. No changes were made.'};
    var cmd=a[0];
    if(SUPPORTED_CMDS.indexOf(cmd)<0)return {ok:false,message:'Unsupported action: "'+cmd+'". I could not apply that change. No changes were made.'};
    var minP=CMD_MIN_PARTS[cmd];
    if(typeof minP==='number' && a.length<minP)return {ok:false,message:'I could not apply that change because the action format was incomplete or malformed. No changes were made.'};
    // Per-command target validation + working-state update
    if(cmd==='setLight'||cmd==='addSofar'||cmd==='addNote'||cmd==='addNote1'||cmd==='addNote2'||cmd==='addNote3'||cmd==='setPriority'||cmd==='clearEntries'||cmd==='setDetail'||cmd==='clearDetail'||cmd==='setBoxBorder'||cmd==='clearBoxBorder'){
      if(!resolveBoxKey(a[1]))return {ok:false,message:'I could not apply that change because the target box could not be found. No changes were made.'};
    }
    else if(cmd==='setSubpageLights'||cmd==='setSubpageBorders'||cmd==='clearSubpageBorders'){
      if(!pageExists(a[1]))return {ok:false,message:'I could not apply that change because the target page could not be found. No changes were made.'};
    }
    else if(cmd==='setPageInfo'){
      var pid=a[1];if(pid!=='overview'&&pid!=='final'&&!pageExists(pid))return {ok:false,message:'I could not apply that change because the target page could not be found. No changes were made.'};
    }
    else if(cmd==='addBox'){
      var spId=a[1],ci=parseInt(a[2]),lbl=a.slice(3).join(':');
      var pg=W.pages[spId];if(!pg)return {ok:false,message:'I could not add that box because the target page could not be found. No changes were made.'};
      if(pg.pageType==='how')return {ok:false,message:'I could not add that box because How pages do not use addBox. No changes were made.'};
      if(isNaN(ci)||ci<0||!pg.cols[ci])return {ok:false,message:'I could not add that box because the target column could not be found. No changes were made.'};
      if(!lbl||!lbl.trim())return {ok:false,message:'I could not add that box because the box label was empty. No changes were made.'};
      pg.cols[ci].boxes.push(lbl);
    }
    else if(cmd==='removeBox'){
      var rb=resolveBoxKey(a[1]);if(!rb||rb.kind!=='tt')return {ok:false,message:'I could not apply that change because the target box could not be found. No changes were made.'};

    }
    else if(cmd==='renameBox'){
      var rn=resolveBoxKey(a[1]);if(!rn)return {ok:false,message:'I could not apply that change because the target box could not be found. No changes were made.'};
      var nlbl=a.slice(2).join(':');if(!nlbl||!nlbl.trim())return {ok:false,message:'I could not apply that change because the new label was empty. No changes were made.'};
      if(rn.kind==='tt')W.pages[rn.pid].cols[rn.ci].boxes[rn.bi]=nlbl;
      else if(rn.kind==='final')W.fo[rn.fi]=nlbl;
    }
    else if(cmd==='addColumn'){
      var spIdC=a[1],ciC=parseInt(a[2]),hC=a.slice(3).join(':');
      var pgC=W.pages[spIdC];if(!pgC)return {ok:false,message:'I could not add that column because the target page could not be found. No changes were made.'};
      if(pgC.pageType==='how')return {ok:false,message:'I could not add that column because How pages do not use columns. No changes were made.'};
      if(isNaN(ciC)||ciC<0||ciC>pgC.cols.length)return {ok:false,message:'I could not add that column because the target column index is out of range. No changes were made.'};
      if(!hC||!hC.trim())return {ok:false,message:'I could not add that column because the heading was empty. No changes were made.'};
      pgC.cols.splice(ciC,0,{h:hC,boxes:[]});
    }
    else if(cmd==='removeColumn'){
      var spIdRc=a[1],ciRc=parseInt(a[2]);var pgRc=W.pages[spIdRc];if(!pgRc)return {ok:false,message:'I could not apply that change because the target page could not be found. No changes were made.'};
      if(pgRc.pageType==='how')return {ok:false,message:'I could not apply that change because How pages do not use columns. No changes were made.'};
      if(isNaN(ciRc)||!pgRc.cols[ciRc])return {ok:false,message:'I could not apply that change because the target column could not be found. No changes were made.'};
      pgRc.cols.splice(ciRc,1);
    }
    else if(cmd==='renameColumn'){
      var spIdRn=a[1],ciRn=parseInt(a[2]),nhRn=a.slice(3).join(':');var pgRn=W.pages[spIdRn];if(!pgRn)return {ok:false,message:'I could not apply that change because the target page could not be found. No changes were made.'};
      if(pgRn.pageType==='how')return {ok:false,message:'I could not apply that change because How pages do not use columns. No changes were made.'};
      if(isNaN(ciRn)||!pgRn.cols[ciRn])return {ok:false,message:'I could not apply that change because the target column could not be found. No changes were made.'};
      if(!nhRn||!nhRn.trim())return {ok:false,message:'I could not apply that change because the new heading was empty. No changes were made.'};
      pgRn.cols[ciRn].h=nhRn;
    }
    else if(cmd==='moveColumn'){
      var spIdMc=a[1],fr=parseInt(a[2]),to=parseInt(a[3]);var pgMc=W.pages[spIdMc];if(!pgMc)return {ok:false,message:'I could not apply that change because the target page could not be found. No changes were made.'};
      if(pgMc.pageType==='how')return {ok:false,message:'I could not apply that change because How pages do not use columns. No changes were made.'};
      if(isNaN(fr)||isNaN(to)||!pgMc.cols[fr]||to<0||to>=pgMc.cols.length)return {ok:false,message:'I could not apply that change because the target column could not be found. No changes were made.'};
      var col=pgMc.cols.splice(fr,1)[0];pgMc.cols.splice(to,0,col);
    }
    else if(cmd==='addSubpage'){
      var lblS=a[1];if(!lblS||!lblS.trim())return {ok:false,message:'I could not add that page because the page title was empty. No changes were made.'};
      var pType='this_then';if(a.length>=3 && a[2] && a[2].charAt(0)!=='#'){if(['this_then','how','documentation'].indexOf(a[2])<0)return {ok:false,message:'I could not add that page because the page type "'+a[2]+'" is not supported. No changes were made.'};pType=a[2];}

      W.pages[newId]=entryS;W.pageOrder.push(newId);
    }
    else if(cmd==='removeSubpage'){
      var rmId=a[1];if(!pageExists(rmId))return {ok:false,message:'I could not apply that change because the target page could not be found. No changes were made.'};

    }
    else if(cmd==='addFinalOutcome'){
      var fl=a.slice(1).join(':');if(!fl||!fl.trim())return {ok:false,message:'I could not add that final outcome because the label was empty. No changes were made.'};
      W.fo.push(fl);
    }
    else if(cmd==='removeFinalOutcome'){
      var fi=parseInt(a[1]);if(isNaN(fi)||fi<0||fi>=W.fo.length)return {ok:false,message:'I could not apply that change because the target final outcome could not be found. No changes were made.'};

    }
    else if(cmd==='addTTLink'){
      var fk=resolveBoxKey(a[1]);var tk=resolveBoxKey(a[2]);if(!fk||!tk||fk.kind!=='tt'||tk.kind!=='tt')return {ok:false,message:'I could not add that link because one of the linked boxes could not be found. No changes were made.'};
    }
    else if(cmd==='removeTTLink'||cmd==='flipTTLink'){
      if(W.ttLinkIds.indexOf(a[1])<0)return {ok:false,message:'I could not apply that change because the target structural link could not be found. No changes were made.'};
      if(cmd==='removeTTLink'){var li=W.ttLinkIds.indexOf(a[1]);W.ttLinkIds.splice(li,1);}
    }
    else if(cmd==='addHowLink'){
      var hfk=resolveBoxKey(a[1]);var htk=resolveBoxKey(a[2]);if(!hfk||!htk)return {ok:false,message:'I could not add that link because one of the linked boxes could not be found. No changes were made.'};
    }
    else if(cmd==='removeHowLink'){
      if(W.howLinkIds.indexOf(a[1])<0)return {ok:false,message:'I could not apply that change because the target structural link could not be found. No changes were made.'};

    }
    else if(cmd==='createMeasure'){
      var mt=a.slice(1).join(':');if(!mt||!mt.trim())return {ok:false,message:'I could not create that Measure because the title was empty. No changes were made.'};

    }
    else if(cmd==='createEQ'){
      var qt=a.slice(1).join(':');if(!qt||!qt.trim())return {ok:false,message:'I could not create that Evaluation Question because the question text was empty. No changes were made.'};
      W.eqs.push('EQ'+String(W.eqs.length+1).padStart(3,'0'));
    }
    else if(cmd==='linkMeasure'||cmd==='unlinkMeasure'){
      if(W.measures.indexOf(a[1])<0)return {ok:false,message:'I could not apply that change because the target Measure could not be found. No changes were made.'};
      if(!resolveBoxKey(a[2]))return {ok:false,message:'I could not apply that change because the target box could not be found. No changes were made.'};
    }
    else if(cmd==='linkEQ'||cmd==='unlinkEQ'){
      if(W.eqs.indexOf(a[1])<0)return {ok:false,message:'I could not apply that change because the target Evaluation Question could not be found. No changes were made.'};
      if(!resolveBoxKey(a[2]))return {ok:false,message:'I could not apply that change because the target box could not be found. No changes were made.'};
    }
    else if(cmd==='deleteMeasure'){
      if(W.measures.indexOf(a[1])<0)return {ok:false,message:'I could not apply that change because the target Measure could not be found. No changes were made.'};
      var dmi=W.measures.indexOf(a[1]);W.measures.splice(dmi,1);
    }
    else if(cmd==='deleteEQ'){
      if(W.eqs.indexOf(a[1])<0)return {ok:false,message:'I could not apply that change because the target Evaluation Question could not be found. No changes were made.'};
      var deqi=W.eqs.indexOf(a[1]);W.eqs.splice(deqi,1);
    }
    // Other state-only commands (setAllLights, setBoardInfo) require no target validation beyond the parts.length check.
  }
  return {ok:true};
}

/* Validate populated This\u2013Then page proposals. Given the structural actions array, count addColumn / removeColumn / addBox actions targeting each predicted new this_then page id, and report any predicted page where the resulting structure would be a one-box placeholder or sparse: fewer than 3 columns total or fewer than 6 boxes. Engine adds 1 default column ("First Stage") when an addSubpage:this_then runs, so total columns = 1 + addColumn(this id) - removeColumn(this id). Total boxes = addBox(this id). This also flags pages whose column headings are mechanical numbered placeholders such as "Stage 1", "Stage 2", "Column 1", "Step 2", "Phase 3" \u2014 these are rejected because column headings must name real causal stages. It also flags pages whose column headings are dominated by the generic logic-model template Inputs / Activities / Outputs (specifically: 2 or more of those generic words used as headings together) so a mechanical "Inputs / Activities / Outputs" page is rejected unless the AI uses a domain-specific shape; single occurrences of those words are still allowed because a domain may genuinely have one stage called "Outputs". The default first-column heading "First Stage" is left alone (this is the engine's default until the AI renames it via renameColumn) \u2014 the AI is expected to renameColumn it to a domain-specific heading; if it does not rename it, the count of generic headings still flags the proposal. Returns array of insufficient predicted page descriptors with totalCols, addBoxes, hasGenericHeadings, and a human-readable reason string. */
function _findInsufficientThisThenPageProposals(structActions){var preds=_predictNewPageIds(structActions);var bad=[];var genericRx=/^(stage|column|step|phase)\s*\d+$/i;var genericTemplateRx=/^(inputs?|activities|outputs?)$/i;preds.forEach(function(p){if(p.pageType!=='this_then')return;var pid=p.predictedId;var addCols=structActions.filter(function(a){return a[0]==='addColumn' && a[1]===pid;}).length;var rmCols=structActions.filter(function(a){return a[0]==='removeColumn' && a[1]===pid;}).length;var totalCols=1+addCols-rmCols;var addBoxes=structActions.filter(function(a){return a[0]==='addBox' && a[1]===pid;}).length;/* scan addColumn / renameColumn headings for mechanical numbered placeholders. If any heading targeting this page id matches the generic pattern, flag the proposal. also count Inputs/Activities/Outputs headings; flag when 2 or more occur together. */var hasGenericHeadings=false;var templateCount=0;for(var k=0;k<structActions.length;k++){var a2=structActions[k];if((a2[0]==='renameColumn' || a2[0]==='addColumn') && a2[1]===pid){var heading=(a2.slice(3).join(':')||'').trim();if(genericRx.test(heading)){hasGenericHeadings=true;}if(genericTemplateRx.test(heading)){templateCount++;}}}var hasGenericTemplate=templateCount>=2;var reason=[];if(totalCols<3)reason.push('only '+totalCols+' column'+(totalCols===1?'':'s'));if(addBoxes<6)reason.push('only '+addBoxes+' box'+(addBoxes===1?'':'es'));if(hasGenericHeadings)reason.push('mechanical numbered column headings');if(hasGenericTemplate)reason.push('generic Inputs / Activities / Outputs template headings');if(reason.length){bad.push({predictedId:pid,label:p.action[1]||'(untitled)',totalCols:totalCols,addBoxes:addBoxes,hasGenericHeadings:hasGenericHeadings,hasGenericTemplate:hasGenericTemplate,reason:reason.join(', ')});}});return bad;}

function processAIResponse(fullText,userMsg){const{clean,actions}=parseActions(fullText);if(!actions.length)return clean;
  /* preflight validation runs first \u2014 before snapshot, before any state-action execution, before showing OK/Cancel. If any action is malformed, has an unsupported command name, or targets a missing object, the WHOLE action set is rejected with a plain-language message and nothing is applied. */
  var v=_validateActionSet(actions);
  if(!v.ok){addChatMsg('system',v.message);return clean;}
  const stateActions=actions.filter(a=>!STRUCTURAL_CMDS.includes(a[0]));const structActions=actions.filter(a=>STRUCTURAL_CMDS.includes(a[0]));
  /* if the user's request is an ambiguous page-creation request (no page type specified, no populated trigger), reject any addSubpage actions emitted by the AI. The AI is expected by the prompt to ask the page-type clarification question instead of emitting addSubpage; this engine-side guard is a safety net so a page is never silently created with the wrong type. Other action shapes (state changes, removals, renames, link/measure/EQ actions, etc.) are unaffected by this guard. */
  if(structActions.length && userMsg && isAmbiguousPageCreationRequest(userMsg)){var hasAddSubpage=structActions.some(function(a){return a[0]==='addSubpage';});if(hasAddSubpage){addChatMsg('system','Your request did not specify the page type (This\u2013Then page, How page, or Documentation page). The change has not been applied. Please clarify which type of page you want \u2014 see the question above \u2014 and the board chat will then propose the right page.');return clean;}}
  /* If the user clearly asked for a populated This\u2013Then page (and did not explicitly ask for a blank/starter page), validate that the AI's proposed structural actions would actually create a properly populated page. Reject sparse proposals (fewer than 3 columns or fewer than 6 boxes) or proposals with mechanical numbered column headings or generic Inputs/Activities/Outputs template headings. The change is rejected before queuing pendingStructural so a one-box placeholder or generic-template page is never silently applied. Other action shapes (How pages, Documentation pages, removals, renames, link/measure/EQ actions, etc.) are unaffected. */
  if(structActions.length && userMsg && isPopulatedThisThenPageRequest(userMsg)){var insufficient=_findInsufficientThisThenPageProposals(structActions);if(insufficient.length){var listing=insufficient.map(function(x){return '"'+x.label+'" ('+x.reason+')';}).join('; ');addChatMsg('system','It looks like you asked for a populated This\u2013Then page, but the proposed change would not create a properly populated page: '+listing+'. A populated This\u2013Then page should have at least 3 columns and at least 6 boxes, and the column headings must name real causal stages for the domain (not "Stage 1, Stage 2, Stage 3" or a generic "Inputs / Activities / Outputs" template). The change has not been applied. Please ask again with more domain-specific detail, or say "add a blank/starter page about X" if you really want a shell.');return clean;}}
  /* mixed-transaction handling. State-only responses still apply directly with a snapshot (preserving the existing safe direct-apply path). Structural-only responses still queue pendingStructural and show OK/Cancel. Mixed responses queue BOTH state and structural actions and present them together in one OK/Cancel preview, so the user sees the full change set and Cancel rolls back to a clean state without partial application. */
  if(structActions.length && stateActions.length){

    pendingStructural=structActions;

  stateActions.forEach(a=>execAction(a));
  if(structActions.length){pendingStructural=structActions;showConfirmation(structActions);}

}

/* showConfirmation now accepts either a string description (legacy) or the structural-actions array. When given the actions array it renders a clean structured summary that groups addSubpage + addColumn / renameColumn / addBox actions by predicted new page id, and shows the page title, the column headings, and the actual box count for each new page. Other structural actions render as one line each. The summary makes it clear what will be added before the user clicks OK. The pendingStructural array (carrying the FULL set of proposed columns and boxes) is unchanged and is still applied in order by confirmStructural on OK. showConfirmation now also accepts a mixed object {state:[...],structural:[...]} so a chat response containing both state and structural actions can be presented in ONE OK/Cancel preview that covers both kinds. */
function showConfirmation(descOrActions){var msgs=document.getElementById('chatMsgs');var div=document.createElement('div');div.className='chat-m sys';var summaryHTML;if(descOrActions && !Array.isArray(descOrActions) && typeof descOrActions==='object' && (descOrActions.state||descOrActions.structural)){summaryHTML=_buildStructuralChangeSummaryHTML(descOrActions.structural||[],descOrActions.state||[]);}else if(Array.isArray(descOrActions)){summaryHTML=_buildStructuralChangeSummaryHTML(descOrActions);}else{summaryHTML='<div style="margin:4px 0">'+escHtml(String(descOrActions))+'</div>';}div.innerHTML='\u26a0\ufe0f Change(s) proposed:'+summaryHTML+'<button onclick="confirmStructural(true)" style="background:#22c55e;color:#fff;border:none;border-radius:5px;padding:4px 12px;margin:5px 4px 0 0;cursor:pointer;font-size:11px;font-weight:600">OK</button><button onclick="confirmStructural(false)" style="background:#ef4444;color:#fff;border:none;border-radius:5px;padding:4px 12px;margin:5px 0 0;cursor:pointer;font-size:11px;font-weight:600">Cancel</button>';msgs.appendChild(div);msgs.scrollTop=msgs.scrollHeight;}

/* Build the structured summary HTML for the confirmation message. addSubpage actions are grouped with their related addColumn / renameColumn / addBox actions (by predicted new page id) into a single readable line per new page that shows the page type, title, column headings and box count. The preview adds a small Populated / Blank-starter status pill for This\u2013Then page proposals so the OK / Cancel preview makes obvious whether a full page is being proposed or only a shell. Unrelated structural actions (removals, renames, etc.) render as one bullet line each, escaped. */
function _buildStructuralChangeSummaryHTML(actions,stateActionsForPreview){

  function _safe(s){return escHtml(String(s==null?'':s));}

  function _resolveMeasureTitle(mid){var m=measures.find(function(x){return x.id===mid;});return m?m.title:mid;}

  function _resolveHowLinkPair(lid){var l=howLinks.find(function(x){return x.id===lid;});if(!l)return null;return {from:_resolveAnyBoxLabel(l.from),to:_resolveAnyBoxLabel(l.to)};}
  function _renderSingleAction(a){

    if(cmd==='addColumn'){var pl5=_pageLabelById(a[1]);return 'Add new column "'+_safe(a.slice(3).join(':'))+'" to page "'+_safe(pl5)+'".';}
    if(cmd==='moveColumn'){var pl6=_pageLabelById(a[1]);var ch6=_resolveColumnHeading(a[1],parseInt(a[2]));return 'Move column "'+_safe(ch6)+'" on page "'+_safe(pl6)+'" to position '+( (parseInt(a[3])||0)+1)+'.';}
    if(cmd==='removeSubpage'){return 'Remove page "'+_safe(_pageLabelById(a[1]))+'".';}
    if(cmd==='addFinalOutcome'){return 'Add new final outcome "'+_safe(a.slice(1).join(':'))+'".';}

    if(cmd==='deleteMeasure'){return 'Delete Measure "'+_safe(_resolveMeasureTitle(a[1]))+'" (and remove all its associations).';}

    if(cmd==='linkMeasure'){return 'Associate Measure "'+_safe(_resolveMeasureTitle(a[1]))+'" with box "'+_safe(_resolveAnyBoxLabel(a[2]))+'".';}
    if(cmd==='linkEQ'){return 'Associate Evaluation Question "'+_safe(_resolveEQText(a[1]))+'" with box "'+_safe(_resolveAnyBoxLabel(a[2]))+'".';}
    if(cmd==='addTTLink'){return 'Add structural link from "'+_safe(_resolveAnyBoxLabel(a[1]))+'" to "'+_safe(_resolveAnyBoxLabel(a[2]))+'".';}
    if(cmd==='addHowLink'){return 'Add How link from "'+_safe(_resolveAnyBoxLabel(a[1]))+'" to "'+_safe(_resolveAnyBoxLabel(a[2]))+'".';}
    if(cmd==='createMeasure'){return 'Create new Measure "'+_safe(a.slice(1).join(':'))+'".';}

    if(cmd==='setLight'){return 'Set status of box "'+_safe(_resolveAnyBoxLabel(a[1]))+'" to '+_safe(a[2])+'.';}
    if(cmd==='setAllLights'){return 'Set status of all boxes to '+_safe(a[1])+'.';}
    if(cmd==='setSubpageLights'){return 'Set status of all boxes on page "'+_safe(_pageLabelById(a[1]))+'" to '+_safe(a[2])+'.';}
    if(cmd==='setPriority'){var _p=normalizePriorityValue(a[2]);return 'Set priority of box "'+_safe(_resolveAnyBoxLabel(a[1]))+'" to '+_safe(_p||'(cleared)')+'.';}
    if(cmd==='setBoxBorder'){return 'Set border color of box "'+_safe(_resolveAnyBoxLabel(a[1]))+'" to '+_safe(a[2])+'.';}
    if(cmd==='clearBoxBorder'){return 'Reset border color of box "'+_safe(_resolveAnyBoxLabel(a[1]))+'" to default.';}
    if(cmd==='setSubpageBorders'){return 'Set border color of all boxes on page "'+_safe(_pageLabelById(a[1]))+'" to '+_safe(a[2])+'.';}
    if(cmd==='clearSubpageBorders'){return 'Reset border color of all boxes on page "'+_safe(_pageLabelById(a[1]))+'" to default.';}
    if(cmd==='setDetail'){return 'Set detail text on box "'+_safe(_resolveAnyBoxLabel(a[1]))+'".';}
    if(cmd==='clearDetail'){return 'Clear detail text on box "'+_safe(_resolveAnyBoxLabel(a[1]))+'".';}
    if(cmd==='addSofar'){return 'Add So-far entry to box "'+_safe(_resolveAnyBoxLabel(a[1]))+'".';}
    if(cmd==='addNote'){return 'Add My-Notes entry to box "'+_safe(_resolveAnyBoxLabel(a[1]))+'".';}
    if(cmd==='addNote1'){return 'Add Notes-1 entry to box "'+_safe(_resolveAnyBoxLabel(a[1]))+'".';}
    if(cmd==='addNote2'){return 'Add Notes-2 entry to box "'+_safe(_resolveAnyBoxLabel(a[1]))+'".';}
    if(cmd==='addNote3'){return 'Add Notes-3 entry to box "'+_safe(_resolveAnyBoxLabel(a[1]))+'".';}
    if(cmd==='clearEntries'){return 'Clear '+_safe(a[2])+' entries on box "'+_safe(_resolveAnyBoxLabel(a[1]))+'".';}
    if(cmd==='setBoardInfo'){return 'Update Board info text.';}
    if(cmd==='setPageInfo'){var p=a[1];var lab=p==='overview'?'Overview':(p==='final'?'Final Outcomes':_pageLabelById(p));return 'Update Page info for "'+_safe(lab)+'".';}

  }
  var html='<div style="margin:6px 0">';
  var usedPageIds={};(SP||[]).forEach(function(sp){if(sp&&sp.id)usedPageIds[sp.id]=true;});var i=0;
  while(i<actions.length){

      var label=a[1]||'(untitled)';var pType=_pageTypeFromAddSubpage(a);var predictedId=nextUnusedPageId(usedPageIds);usedPageIds[predictedId]=true;

        else if(b[0]==='renameColumn' && b[1]===predictedId){colsRenamed[parseInt(b[2])]=b.slice(3).join(':');j++;}

        else{statusPill=' <span style="background:#94a3b8;color:#fff;font-size:10px;font-weight:700;padding:1px 6px;border-radius:3px;margin-left:4px;letter-spacing:0.3px">BLANK/STARTER</span>';}

        sortedAdds.forEach(function(c){colHeadings.push(colsRenamed[c.idx]||c.h);});

      else if(pType==='how'){line+=' \u2014 default 8 How Boxes';}
      else if(pType==='documentation' && boxesAdded.length){line+=' \u2014 '+boxesAdded.length+' box'+(boxesAdded.length===1?'':'es');}

  if(stateActionsForPreview && stateActionsForPreview.length){

    }
  }
  html+='</div>';
  return html;
}
function confirmStructural(ok){
  /* mixed-transaction commit. On OK we apply the queued pendingStateActions first (so they execute against the pre-structural state) then the queued pendingStructural; on Cancel we doUndo() to roll back to the snapshot taken in processAIResponse so neither the state changes nor the structural changes are partially applied. Both queues are cleared either way. */
  if(ok){
    if(pendingStateActions && pendingStateActions.length){pendingStateActions.forEach(function(a){execAction(a);});}
    if(pendingStructural && pendingStructural.length){pendingStructural.forEach(function(a){execAction(a);});}
  }else{
    doUndo();
  }
  pendingStateActions=[];
  pendingStructural=[];
  addChatMsg('system',ok?'Changes applied.':'Changes cancelled.');
}

le so the user can still see and correct what they typed.) */var openLink=safeHref?'<a href="'+escAttr(safeHref)+'" target="_blank" rel="noopener noreferrer" class="src-open-link" title="Open URL in new tab" style="font-size:12px;color:var(--od);text-decoration:underline;white-space:nowrap;padding:0 6px">Open</a>':'';html+='<div class="src-edit-row" data-idx="'+i+'" style="display:flex;gap:6px;align-items:center;margin-bottom:6px;flex-wrap:wrap">'

+openLink

function getMeasure(id){var nid=normalizeMeasureIdInput(id);return measures.find(m=>m.id===nid);}
function getEQ(id){var nid=normalizeEQIdInput(id);return evalQuestions.find(q=>q.id===nid);}
function _uniqueNormalizedIds(list,normalizer){var out=[];var seen={};(Array.isArray(list)?list:[]).forEach(function(id){var n=normalizer(id);if(!n||seen[n])return;seen[n]=true;out.push(n);});return out;}
function uniqueMeasureRefs(list){return _uniqueNormalizedIds(list,normalizeMeasureIdInput);}
function uniqueEQRefs(list){return _uniqueNormalizedIds(list,normalizeEQIdInput);}
function normalizeBoxMEQRefs(box){if(!box)return;if(!Array.isArray(box.measures))box.measures=[];else box.measures=uniqueMeasureRefs(box.measures);if(!Array.isArray(box.evalQuestions))box.evalQuestions=[];else box.evalQuestions=uniqueEQRefs(box.evalQuestions);}
function normalizeBoxMEQRefsInMemory(){if(!B)return;Object.keys(B).forEach(function(k){normalizeBoxMEQRefs(B[k]);});}
function normalizeMeasureEvalQuestionIdsInMemory(){
  if(Array.isArray(measures)){measures.forEach(function(m){if(m&&m.id)m.id=normalizeMeasureIdInput(m.id);});}
  if(Array.isArray(evalQuestions)){evalQuestions.forEach(function(q){if(q&&q.id)q.id=normalizeEQIdInput(q.id);});}
  if(Array.isArray(ttLinks)){ttLinks.forEach(function(l){if(!l)return;if(Array.isArray(l.measures))l.measures=uniqueMeasureRefs(l.measures);if(Array.isArray(l.evalQuestions))l.evalQuestions=uniqueEQRefs(l.evalQuestions);});}
}
function getMeasuresForBox(boxKey){var box=B[boxKey];if(!box)return [];normalizeBoxMEQRefs(box);return box.measures.map(getMeasure).filter(function(m){return !!m;});}
function getEvalQuestionsForBox(boxKey){var box=B[boxKey];if(!box)return [];normalizeBoxMEQRefs(box);return box.evalQuestions.map(getEQ).filter(function(q){return !!q;});}
function getBoxesForMeasure(mId){var nid=normalizeMeasureIdInput(mId);return Object.keys(B).filter(function(k){normalizeBoxMEQRefs(B[k]);return B[k].measures.includes(nid);});}
function getBoxesForEvalQuestion(eqId){var nid=normalizeEQIdInput(eqId);return Object.keys(B).filter(function(k){normalizeBoxMEQRefs(B[k]);return B[k].evalQuestions.includes(nid);});}
function getBoxesLinkedToMeasure(mId){return getBoxesForMeasure(mId);}
function getBoxesLinkedToEQ(eqId){return getBoxesForEvalQuestion(eqId);}

function tagHTMLForElement(el){if(!el)return '';var ids=cleanTagIds(el.tagIds||[]);return ids.map(function(id){var t=getTag(id);if(!t)return '';var sl=normalizeTagShortLabel(t.shortLabel||'');if(!sl)return '';return '<span class="doview-tag" title="Tag: '+escAttr(t.label||sl)+'">\u00B7 '+escHtml(sl)+'</span>';}).join('');}
