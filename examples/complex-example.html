function ensureTagIdsOnSupportedElements(){Object.values(B||{}).forEach(function(b){if(b&&!Array.isArray(b.tagIds))b.tagIds=[];});(SP||[]).forEach(function(sp){if(sp&&sp.overviewCard&&!Array.isArray(sp.overviewCard.tagIds))sp.overviewCard.tagIds=[];});(ttLinks||[]).forEach(function(l){if(l&&!Array.isArray(l.tagIds))l.tagIds=[];});(howLinks||[]).forEach(function(l){if(l&&!Array.isArray(l.tagIds))l.tagIds=[];});(measures||[]).forEach(function(m){if(m&&!Array.isArray(m.tagIds))m.tagIds=[];});(evalQuestions||[]).forEach(function(q){if(q&&!Array.isArray(q.tagIds))q.tagIds=[];});}
function buildInlineCreateTag(kind,id,pickerId,selectWord){if(IS_READONLY)return '';var suffix=String(pickerId).replace(/[^A-Za-z0-9_]/g,'_');return '<div class="tag-edit-only" style="margin-top:6px;display:flex;gap:5px;flex-wrap:wrap;align-items:center"><input class="tag-short-input" id="newTagShort_'+suffix+'" maxlength="6" placeholder="Tag"><input class="tag-label-input" id="newTagLabel_'+suffix+'" placeholder="Tag name"><input class="tag-desc-input" id="newTagDesc_'+suffix+'" placeholder="Description (optional)"><button class="meq-abtn" onclick="createInlineTagAndApply(\''+kind+'\',\''+id+'\',\''+pickerId+'\')">'+(selectWord||'Create and apply')+'</button></div>';}
function buildTagAssignmentSection(kind,id,el){if(!el)return '';if(!Array.isArray(el.tagIds))el.tagIds=[];var ids=cleanTagIds(el.tagIds||[]);el.tagIds=ids;var cur=ids.length?ids.map(function(tid){var t=getTag(tid);if(!t)return '';var sl=normalizeTagShortLabel(t.shortLabel||'');return '<span class="ep-tag-pill" title="Tag: '+escAttr(t.label||sl)+'">'+escHtml(sl)+(IS_READONLY?'':' <span class="ep-tag-rm tag-edit-only" onclick="removeTagFromElement(\''+kind+'\',\''+id+'\',\''+tid+'\')" title="Remove tag">✕</span>')+'</span>';}).join(' '):'None';var add='';if(!IS_READONLY){var pickerId='tagPicker_'+kind+'_'+String(id).replace(/[^A-Za-z0-9_]/g,'_');var opts='<option value="">Select tag…</option>';(tags||[]).forEach(function(t){if(!ids.includes(t.id)){opts+='<option value="'+escAttr(t.id)+'">'+escHtml(normalizeTagShortLabel(t.shortLabel||''))+' — '+escHtml(t.label||'')+'</option>';}});add='<select class="meq-sel tag-edit-only" id="'+pickerId+'" style="max-width:160px" onfocus="refreshTagPicker(\''+kind+'\',\''+id+'\',\''+pickerId+'\')">'+opts+'</select><button class="meq-abtn tag-edit-only" onclick="addTagFromElementPicker(\''+kind+'\',\''+id+'\',\''+pickerId+'\')">Add tag</button><span class="meq-footer-link tag-edit-only" onclick="openTagsManager()">Manage tags</span>'; }return '<div class="ep-tags"><span class="ep-lbl">Tags:</span><span>'+cur+'</span>'+add+'</div>';}
function buildBoxTagsSection(key){return buildTagAssignmentSection('box',key,B[key]);}
function getTaggedElement(kind,id){if(kind==='box')return B[id];if(kind==='overviewPage'){var sp=findPageById(id);return sp?ensureOverviewCardMeta(sp):null;}if(kind==='ttLink')return (ttLinks||[]).find(function(l){return l.id===id;});if(kind==='howLink')return (howLinks||[]).find(function(l){return l.id===id;});if(kind==='measure')return getMeasure(id);if(kind==='eq')return getEQ(id);return null;}
function refreshTagPicker(kind,id,pickerId){var sel=document.getElementById(pickerId);if(!sel)return;var el=getTaggedElement(kind,id)||{tagIds:[]};var ids=cleanTagIds(el.tagIds||[]);var cur=sel.value;var opts='<option value="">Add tag…</option>';(tags||[]).forEach(function(t){if(!ids.includes(t.id)||t.id===cur)opts+='<option value="'+escAttr(t.id)+'">'+escHtml(normalizeTagShortLabel(t.shortLabel||''))+' — '+escHtml(t.label||'')+'</option>';});sel.innerHTML=opts;if(cur)sel.value=cur;}
function createInlineTagAndApply(kind,id,pickerId){if(IS_READONLY)return;var suffix=String(pickerId).replace(/[^A-Za-z0-9_]/g,'_');var sl=normalizeTagShortLabel((document.getElementById('newTagShort_'+suffix)||{}).value);var lab=String((document.getElementById('newTagLabel_'+suffix)||{}).value||'').trim();var desc=String((document.getElementById('newTagDesc_'+suffix)||{}).value||'').trim();if(!sl&&!lab){alert('Tag name cannot be empty.');return;}if(!sl)sl=normalizeTagShortLabel(lab);if(!lab)lab=sl;var tag={id:_genUid('tag'),shortLabel:sl,label:lab,description:desc};tags.push(tag);var el=getTaggedElement(kind,id);if(el){if(!Array.isArray(el.tagIds))el.tagIds=[];if(!el.tagIds.includes(tag.id))el.tagIds.push(tag.id);}saveState();render();if(kind==='measure')openMeasureDetail(id);else if(kind==='eq')openEQDetail(id);else if(kind==='ttLink'||kind==='howLink')openLinkDetail(id);else if(kind==='box')openEntryPanel(id);}
function addTagFromElementPicker(kind,id,pickerId){if(IS_READONLY)return;refreshTagPicker(kind,id,pickerId);var sel=document.getElementById(pickerId);var el=getTaggedElement(kind,id);if(!sel||!sel.value||!el)return;if(!Array.isArray(el.tagIds))el.tagIds=[];if(!el.tagIds.includes(sel.value))el.tagIds.push(sel.value);saveState();render();if(kind==='measure')openMeasureDetail(id);else if(kind==='eq')openEQDetail(id);else if(kind==='ttLink'||kind==='howLink')openLinkDetail(id);else if(kind==='box')openEntryPanel(id);}
function removeTagFromElement(kind,id,tagId){if(IS_READONLY)return;var el=getTaggedElement(kind,id);if(!el||!Array.isArray(el.tagIds))return;el.tagIds=el.tagIds.filter(function(x){return x!==tagId;});saveState();render();if(kind==='measure')openMeasureDetail(id);else if(kind==='eq')openEQDetail(id);else if(kind==='ttLink'||kind==='howLink')openLinkDetail(id);else if(kind==='box')openEntryPanel(id);}
function addTagFromBoxPicker(key){var sel=document.getElementById('boxTagPicker');if(sel)addTagFromElementPicker('box',key,'boxTagPicker');}
function removeTagFromBox(key,tagId){removeTagFromElement('box',key,tagId);}
function removeDeletedTagFromAllElements(tagId){Object.keys(B||{}).forEach(function(k){if(B[k]&&Array.isArray(B[k].tagIds))B[k].tagIds=B[k].tagIds.filter(function(id){return id!==tagId;});});(SP||[]).forEach(function(sp){if(sp&&sp.overviewCard&&Array.isArray(sp.overviewCard.tagIds))sp.overviewCard.tagIds=sp.overviewCard.tagIds.filter(function(id){return id!==tagId;});});(ttLinks||[]).forEach(function(l){if(l&&Array.isArray(l.tagIds))l.tagIds=l.tagIds.filter(function(id){return id!==tagId;});});(howLinks||[]).forEach(function(l){if(l&&Array.isArray(l.tagIds))l.tagIds=l.tagIds.filter(function(id){return id!==tagId;});});(measures||[]).forEach(function(m){if(m&&Array.isArray(m.tagIds))m.tagIds=m.tagIds.filter(function(id){return id!==tagId;});});(evalQuestions||[]).forEach(function(q){if(q&&Array.isArray(q.tagIds))q.tagIds=q.tagIds.filter(function(id){return id!==tagId;});});}
function setTagValidation(msg){var el=document.getElementById('tagValidation');if(!el)return;el.textContent=msg||'';el.style.display=msg?'block':'none';}
function clearTagValidation(){setTagValidation('');}
function openTagsManager(){tagManagerDraft=JSON.parse(JSON.stringify(tags||[]));renderTagsManager();clearTagValidation();openModal('tagsModal');}
function renderTagsManager(){var el=document.getElementById('tagsList');if(!el)return;var list=tagManagerDraft||[];var html='';if(!list.length)html='<div style="color:var(--text2);font-style:italic;padding:8px 0">No tags created yet.</div>';list.forEach(function(t,i){html+='<div class="tag-manager-row"><input class="tag-short-input ro-keep-editable" id="tagShort_'+i+'" maxlength="6" value="'+escAttr(normalizeTagShortLabel(t.shortLabel||''))+'" '+(IS_READONLY?'disabled':'')+'><input class="tag-label-input ro-keep-editable" id="tagLabel_'+i+'" value="'+escAttr(t.label||'')+'" placeholder="Tag name" '+(IS_READONLY?'disabled':'')+'><input class="tag-desc-input ro-keep-editable" id="tagDesc_'+i+'" value="'+escAttr(t.description||'')+'" placeholder="Description" '+(IS_READONLY?'disabled':'')+'><button class="tag-small-btn tag-del-btn tag-edit-only" onclick="deleteTagDraft('+i+')">Delete</button></div>';});el.innerHTML=html;var add=document.getElementById('tagsAddRow');if(add)add.style.display=IS_READONLY?'none':'block';}
function _syncTagDraftFromDOM(){if(!tagManagerDraft)return;tagManagerDraft.forEach(function(t,i){var sl=document.getElementById('tagShort_'+i),lab=document.getElementById('tagLabel_'+i),desc=document.getElementById('tagDesc_'+i);if(sl)t.shortLabel=normalizeTagShortLabel(sl.value);if(lab)t.label=String(lab.value||'').trim();if(desc)t.description=String(desc.value||'').trim();});}
function addTagDraftRow(){if(IS_READONLY)return;_syncTagDraftFromDOM();if(!tagManagerDraft)tagManagerDraft=JSON.parse(JSON.stringify(tags||[]));var sl=normalizeTagShortLabel((document.getElementById('newTagShort')||{}).value);var lab=String((document.getElementById('newTagLabel')||{}).value||'').trim();var desc=String((document.getElementById('newTagDesc')||{}).value||'').trim();if(!sl&&!lab){setTagValidation('Enter a tag name or short tag before adding.');var f=document.getElementById('newTagLabel')||document.getElementById('newTagShort');if(f&&f.focus)f.focus();return;}clearTagValidation();if(!sl)sl=normalizeTagShortLabel(lab);if(!lab)lab=sl;tagManagerDraft.push({id:_genUid('tag'),shortLabel:sl,label:lab,description:desc});['newTagShort','newTagLabel','newTagDesc'].forEach(function(x){var e=document.getElementById(x);if(e)e.value='';});renderTagsManager();}
function deleteTagDraft(i){if(IS_READONLY)return;_syncTagDraftFromDOM();if(!tagManagerDraft)return;tagManagerDraft.splice(i,1);renderTagsManager();}
function saveTagsManager(){if(IS_READONLY){closeModal('tagsModal');return;}clearTagValidation();_syncTagDraftFromDOM();var oldIds=(tags||[]).map(function(t){return t.id;});var next=[];(tagManagerDraft||[]).forEach(function(t){var sl=normalizeTagShortLabel(t.shortLabel||'');var lab=String(t.label||'').trim();if(!sl&&!lab)return;if(!sl)sl=normalizeTagShortLabel(lab);if(!lab)lab=sl;next.push({id:t.id||_genUid('tag'),shortLabel:sl,label:lab,description:String(t.description||'').trim()});});var newIds={};next.forEach(function(t){newIds[t.id]=true;});oldIds.forEach(function(id){if(!newIds[id])removeDeletedTagFromAllElements(id);});tags=next;tagManagerDraft=null;saveState();closeModal('tagsModal');render();}
function cancelTagsManager(){tagManagerDraft=null;clearTagValidation();closeModal('tagsModal');}
function createTag(){addTagDraftRow();}
function saveTagRow(i){_syncTagDraftFromDOM();renderTagsManager();}
function deleteTag(tagId){if(IS_READONLY)return;if(!confirm('Delete this tag and remove it from all supported tagged elements?'))return;tags=tags.filter(function(t){return t.id!==tagId;});removeDeletedTagFromAllElements(tagId);saveState();renderTagsManager();render();}



function openMeasuresRegistry(){let html='';var cb=document.getElementById('measuresShowTags');if(cb)cb.checked=registryShowTags.measures!==false;if(!measures.length){html='<div style="color:var(--text2);font-style:italic;padding:8px 0">No measures created yet.</div>';}else{measures.forEach(m=>{const cnt=getBoxesLinkedToMeasure(m.id).length;const status=cnt?cnt+' associated':'not associated';html+='<div class="meq-reg-item"><span class="meq-reg-id">'+escHtml(measureDisplayId(m))+'</span><span class="meq-reg-title" onclick="closeModal(\'measuresRegistryModal\');openMeasureDetail(\''+m.id+'\')">'+escHtml(m.title)+(registryShowTags.measures===false?'':tagHTMLForElement(m))+'</span><span class="meq-reg-status">'+status+'</span><span class="meq-item-rm" onclick="event.stopPropagation();deleteMeasure(\''+m.id+'\')" title="Delete">✕</span></div>';});}document.getElementById('measuresRegistryList').innerHTML=html;openModal('measuresRegistryModal');}
function openEQRegistry(){let html='';var cb=document.getElementById('eqShowTags');if(cb)cb.checked=registryShowTags.eq!==false;if(!evalQuestions.length){html='<div style="color:var(--text2);font-style:italic;padding:8px 0">No evaluation questions created yet.</div>';}else{evalQuestions.forEach(q=>{const cnt=getBoxesLinkedToEQ(q.id).length;const status=cnt?cnt+' associated':'not associated';html+='<div class="meq-reg-item"><span class="meq-reg-id">'+escHtml(eqDisplayId(q))+'</span><span class="meq-reg-title" onclick="closeModal(\'eqRegistryModal\');openEQDetail(\''+q.id+'\')">'+escHtml(q.questionText)+(registryShowTags.eq===false?'':tagHTMLForElement(q))+'</span><span class="meq-reg-status">'+status+'</span><span class="meq-item-rm" onclick="event.stopPropagation();deleteEQ(\''+q.id+'\')" title="Delete">✕</span></div>';});}document.getElementById('eqRegistryList').innerHTML=html;openModal('eqRegistryModal');}

function buildEQSection(key){if(!B[key])return '';const linked=getEvalQuestionsForBox(key);let items='';linked.forEach(q=>{items+='<div class="meq-item"><span class="meq-item-id">'+escHtml(eqDisplayId(q))+'</span><span class="meq-item-title" onclick="openEQDetail(\''+q.id+'\')">'+escHtml(q.questionText)+tagHTMLForElement(q)+'</span><span class="meq-item-rm" onclick="unlinkEQFromBox(\''+q.id+'\',\''+key+'\')" title="Remove association">✕</span></div>';});

function renderMd(text){return linkify(text.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/\*\*(.*?)\*\*/g,'<strong>$1</strong>').replace(/\*(.*?)\*/g,'<em>$1</em>')).replace(/\n/g,'<br>');}

function buildBoardStatePrompt(fullBoard,structural){let s=`You are a helpful assistant with full awareness of this DoView board: "${TITLE}".\nDOVIEW RULES: Boxes=outcome statements ending \u2026ed. STRICT RULE: NEVER use auxiliary-verb forms (were/was/is/are/have been/will be/has been) in This\u2013Then box labels \u2014 always use compact DoView outcome phrasing instead. Examples of CORRECT compact phrasing: "Predators, browsers and weeds controlled at priority sites", "Funding secured", "Risks identified early". Examples of WRONG auxiliary-verb phrasing that must be rewritten: "were controlled", "was secured", "are identified", "is in place", "have been completed". If you find yourself producing a label with were/was/is/are/have been, STOP and rewrite it in compact DoView form before emitting it. This rule applies BOTH when building new boards AND when editing existing ones \u2014 if an existing box already uses auxiliary-verb phrasing, you should rewrite it into compact form. L\u2192R=earlier\u2192later causal flow. Cols=causal stages named descriptively not generically. Column headings label the stage only \u2014 not extra boxes; if a heading reads like a missing box, rewrite it or make it a box. Vary col/row counts by real-world domain logic. No templates. Avoiding one banned shape is not enough: do not add populated pages with repeated or near-matching geometry such as 4-4-4-4 / 4-4-4-3 unless the domain genuinely requires it. Do not achieve anti-stereotype variation by overloading final/right-hand columns with many terminal outcomes; ordinary This–Then pages usually end with 1–3 page-level terminal outcomes, 4 needs a domain reason, and 5+ should be rare. Distinguish these page-level terminal outcomes from the board-level Final Outcomes page. Include assumptions/risks phrased positively. One concept per box. Multiple final outcomes allowed.\n\nBOARD-CHAT INTENT CLASSIFICATION. Before generating any actions, classify the user's request silently into ONE of these intents:\n  (1) question / explanation only \u2014 the user is asking what something means, asking the board to explain something, asking for advice or a summary, or asking "what does this board say about X?". Answer in plain language. Do NOT propose structural edits. Do NOT emit ACTION tags unless the user clearly asks for a change.\n  (2) state-only edit \u2014 setLight / setPriority / addSofar / addNote / addNote1 / addNote2 / addNote3 / setDetail / clearDetail / setBoxBorder / clearBoxBorder / setBoardInfo / setPageInfo. Emit the ACTION tag and answer briefly in past tense (e.g. "Done").\n  (3) structural edit (existing pages/boxes/columns) \u2014 addBox / removeBox / renameBox / addColumn / removeColumn / renameColumn / moveColumn / removeSubpage / addFinalOutcome / removeFinalOutcome / addHowBox / removeHowBox / renameHowBox. Emit the ACTION tag(s) and explain in FUTURE TENSE.\n  (4) blank This\u2013Then page creation \u2014 the user explicitly asked for a "blank", "starter", "empty", or "page shell" This\u2013Then page. Emit just [ACTION:addSubpage:LABEL:this_then] without populating it.\n  (5) populated This\u2013Then page creation \u2014 see below for the full populated-page rule.\n  (6) How page creation \u2014 the user explicitly asked for a How page. Emit [ACTION:addSubpage:LABEL:how]; the engine seeds 8 starter How Boxes.\n  (7) Documentation page creation \u2014 the user explicitly asked for a Documentation page. Emit [ACTION:addSubpage:LABEL:documentation].\n  (8) ambiguous page creation \u2014 the user asked to add/create/make a page but did NOT specify the page type and did NOT clearly imply a populated This\u2013Then page. DO NOT emit any ACTION tags. Instead reply with the page-type clarification question below and stop. Wait for the user's answer.\n  (9) invalid or incomplete action proposal \u2014 if you cannot generate a valid, complete action set (for example because a referenced box does not exist), explain the problem and ask the user for clarification rather than emitting partial ACTION tags.\nThe classification is invisible to the UI \u2014 you do not need to label your reply as "intent: 4" or similar. Just behave according to the classification.\n\nASK PAGE TYPE WHEN PAGE CREATION IS AMBIGUOUS. If the user asks to add/create/make a page but does NOT clearly specify the page type AND does NOT clearly imply a populated This\u2013Then page (via "full DoView", "complete DoView", "full logic", "full populated page", "populate it", "add DoView This\u2013Then boxes", "create a This\u2013Then logic for X", "add a This\u2013Then page", or "add a page and fill it in"), reply with this exact wording (or preserve it very closely) and DO NOT emit any ACTION tag:\n\n  What type of page do you want?\n  - This\u2013Then page \u2014 shows what you want to happen in the world, and what leads to what.\n  - How page \u2014 shows what is going to be done.\n  - Documentation page \u2014 holds supporting notes, explanation and basic rich-text documentation about the DoView Board.\n\nThen STOP and wait for the user's answer. Do NOT create the page and ask the question at the same time. Do NOT default ambiguous page requests to This\u2013Then. Do NOT default ambiguous page requests to Documentation. After the user answers, propose the appropriate page.\n\nExamples of ambiguous requests that REQUIRE the page-type clarification question above (no ACTION tag emitted):\n  \u2022 "add a page called leadership development"\n  \u2022 "create a new page about leadership development"\n  \u2022 "make a page for leadership development"\n  \u2022 "add leadership development as a page"\n  \u2022 "add a starter page called leadership development" (page type missing \u2014 still ask)\n\nExamples that BYPASS the clarification (do NOT ask the page-type question; go ahead with the appropriate ACTION tags):\n  \u2022 "add a This\u2013Then page called leadership development"\n  \u2022 "add a How page called leadership development"\n  \u2022 "add a Documentation page called leadership development"\n  \u2022 "add a blank This\u2013Then page called leadership development" (blank with explicit type)\n  \u2022 "add a new page called leadership development which includes a full DoView on it" (populated trigger \u2014 see populated-page examples below)\n  \u2022 "add a complete DoView page about leadership development"\n  \u2022 "create a full logic for leadership development"\n  \u2022 "add a full populated page about leadership development"\n  \u2022 "make a page on leadership development with the full DoView logic"\n\n`;if(structural){s+=`\nFULL DOVIEW METHODOLOGY (apply when creating/restructuring content):\n- Extract all outcomes or steps to outcomes from the domain\n- Write as outcome statements using phrasing that tends to end with \u2026ed\n- STRICT: Do NOT write box labels with auxiliary-verb forms such as were / was / is / are / have been / will be / has been. Use compact DoView outcome phrasing instead. If you accidentally produce auxiliary-verb phrasing, REWRITE the label into compact form before emitting it. This applies both to newly created boxes and to any boxes you are editing or renaming.\n- Map This\u2192Then relationships: if achieving A tends to lead to B, A goes left of B\n- Keep boxes tight: one concept per box\n- World-centric: include external assumptions and risks, phrased positively\n- Not only quantifiable: do not restrict boxes to measurable items only\n- Avoid siloing: a left-side box can influence multiple right-side boxes\n- Columns = causal stages, named descriptively for the specific domain\n- Column headings label the causal stage only; they are not extra boxes. If a heading reads like a missing outcome, step, action, or condition, rewrite it or make it a box\n- Vary box counts: the number of boxes per column is determined by how many genuinely distinct outcomes occur at that causal stage in the real world, not by a template\n- Vary column counts: different subpages have different numbers of causal stages\n- Use qualifiers: adequate / sufficient / high-quality where appropriate\n- Final column boxes are bold (handled by engine)\n- When building or generating new boards, do not pre-assign non-neutral Traffic Lights or priorities unless the user explicitly asks for them. Leave Traffic Lights grey/unset and priorities empty by default.\n- When adding a subpage, always use [ACTION:addSubpage:LABEL:PAGE_TYPE] where PAGE_TYPE is this_then, how, or documentation. If the user has not specified a page type AND has not clearly implied a populated This\u2013Then page, ask the page-type clarification question above BEFORE creating any page \u2014 do not guess a default. The engine auto-assigns colors \u2014 NEVER ask the user to choose colors.\n- POPULATED vs BLANK This\u2013Then page rule. When the user asks the board chat to add a NEW This\u2013Then page about a topic AND has either explicitly named the type OR clearly triggered the populated-page behavior, this is a POPULATED-page request. Trigger phrasings include: "add a This\u2013Then page about X", "add a new This\u2013Then page about X", "populate it", "add DoView This\u2013Then boxes", "create a This\u2013Then logic for X", "add a page and fill it in", AND any phrasing using "full DoView", "complete DoView", "full logic", or "full populated page" \u2014 for example "add a new page called X which includes a full DoView on it", "add a complete DoView page about X", "create a full logic for X", "add a full populated page about X", "make a page on X with the full DoView logic". You MUST emit, in ONE response, the FULL set of action tags so the engine can apply the populated page in a single OK confirmation step:\n  * one [ACTION:addSubpage:LABEL:this_then]\n  * AT LEAST 3 columns total. The engine creates the new page with one default first column called "First Stage". Use [ACTION:renameColumn:NEW_PAGE_ID:0:NEW_HEADING] to rename it (column headings name causal stages \u2014 not generic "Stage 1, Stage 2") and emit AT LEAST 2 more [ACTION:addColumn:NEW_PAGE_ID:COLUMN_INDEX:HEADING] tags so the page has at least 3 columns total\n  * AT LEAST 6 boxes total spread across those columns via [ACTION:addBox:NEW_PAGE_ID:COLUMN_INDEX:LABEL] tags, using compact DoView outcome phrasing (no auxiliary-verb forms)\n  * Boxes flow left-to-right in plausible This\u2192Then causal order. Final/right-hand boxes represent later or higher-level outcomes for the page.\n- DOMAIN-SHAPED PAGE STRUCTURE. When you create a populated This\u2013Then page, the number of columns and the number of boxes in each column MUST reflect the actual causal structure of the domain being modelled. Do NOT use an arbitrary template such as 3 columns with 2 or 3 boxes each. Use as many causal stages as are genuinely needed for the domain. Vary the number of boxes per column according to how many distinct outcomes, conditions, or enabling steps exist at that stage. Column headings must name real causal stages \u2014 not generic labels such as "Stage 1", "Stage 2", "Inputs", "Activities", "Outputs" \u2014 unless those words are genuinely the best domain-specific headings. The "at least 3 columns and at least 6 boxes" rule above is a FLOOR, not a target or a template: a populated page about a domain that naturally has 4, 5, or more causal stages should have 4, 5, or more columns; if some columns naturally have 1 box and others naturally have 4, mirror that real-world variation. Mechanical "3 columns x 2 boxes" or "3 columns x 3 boxes" templates will be rejected by the engine.\n- Explicit type wins. If the user explicitly requests a How Page or Documentation Page, respect that explicit page type rather than forcing This\u2013Then \u2014 even if the message also contains "full DoView" or similar (e.g. "make a Documentation page with a full DoView" \u2192 still create a Documentation page, do NOT force This\u2013Then).\n- Predicting NEW_PAGE_ID for the addColumn / addBox / renameColumn tags: the engine assigns the new page id as the next unused pN value. Look at the FULL board state above to identify existing SP ids (p1, p2, p3, \u2026) and use the next free id that is not already present. Emit ALL the addColumn, renameColumn and addBox tags in the same response, referencing that predicted NEW_PAGE_ID. The engine applies addSubpage first, so by the time the addColumn / addBox tags run, the new page exists with that id.\n- A one-box placeholder (just [ACTION:addSubpage:LABEL:this_then] with no addColumn/addBox tags) is NOT acceptable for a populated-page request. The engine will reject the change and ask you/the user to retry. Always emit the full populated structure in one response.\n- BLANK / starter pages: only when the user EXPLICITLY asks for a "blank", "starter", "empty", or "page shell" page may you emit just [ACTION:addSubpage:LABEL:this_then] without populating it. In that case the engine creates a blank starter page as before. If the user has stated a populated trigger (full DoView, full logic, populate it, etc.), treat it as POPULATED.\n- Worked example. Suppose the current board already has p1, p2, p3 and the user says "add a new page called staff retention which includes a full DoView on it". Then in ONE response, emit:\n    [ACTION:addSubpage:Staff retention:this_then]\n    [ACTION:renameColumn:p4:0:Causes addressed]\n    [ACTION:addColumn:p4:1:Conditions established]\n    [ACTION:addColumn:p4:2:Outcomes secured]\n    [ACTION:addBox:p4:0:Pay and conditions reviewed]\n    [ACTION:addBox:p4:0:Workload pressures eased]\n    [ACTION:addBox:p4:1:Career development pathways in place]\n    [ACTION:addBox:p4:1:Effective management strengthened]\n    [ACTION:addBox:p4:2:Voluntary turnover reduced]\n    [ACTION:addBox:p4:2:Workforce capability retained]\n  Use future tense ("a new This\u2013Then page will be added with three columns and six boxes\u2026") because the user must confirm before the change takes effect. Note that 3 columns and 6 boxes is the MINIMUM \u2014 if staff retention genuinely needs more causal stages or more boxes per column, use them.\n`;}if(fullBoard||currentPage==='overview'||currentPage==='final'){s+=`\nFull board state:\n`;SP.forEach(sp=>{s+=`\n[${sp.label} (id:${sp.id}, type:${sp.pageType||'this_then'})]\n`;if(sp.pageType==='how'&&sp.howBoxes){sp.howBoxes.forEach(hb=>{const k=`${sp.id}-${hb.id}`;const b=B[k];if(!b)return;const pri=b.priority?` [Pri:${b.priority}]`:'';const sf=b.entries.filter(e=>e.type==='sofar').map(e=>e.text).join('; ');const nt=b.entries.filter(e=>e.type==='note').map(e=>e.text).join('; ');const n1=b.entries.filter(e=>e.type==='note1').map(e=>e.text).join('; ');const n2=b.entries.filter(e=>e.type==='note2').map(e=>e.text).join('; ');const n3=b.entries.filter(e=>e.type==='note3').map(e=>e.text).join('; ');const dt=b.detailText||'';const bc=b.borderColor||'';s+=`    ${k} | ${b.light.toUpperCase()}${pri}: ${b.label}${sf?' \u2014 Notes 1: '+sf:''}${nt?' \u2014 Notes: '+nt:''}${n1?' \u2014 Notes1: '+n1:''}${n2?' \u2014 Notes2: '+n2:''}${n3?' \u2014 Notes3: '+n3:''}${dt?' \u2014 Detail: '+dt:''}${bc?' \u2014 Border: '+bc:''}\n`;});}else{sp.cols.forEach((col,ci)=>{s+=`  Column ${ci+1}: "${col.h}"\n`;col.boxes.forEach((_,bi)=>{const k=`${sp.id}-c${ci}-b${bi}`;const b=B[k];if(!b)return;const pri=b.priority?` [Pri:${b.priority}]`:'';const sf=b.entries.filter(e=>e.type==='sofar').map(e=>e.text).join('; ');const nt=b.entries.filter(e=>e.type==='note').map(e=>e.text).join('; ');const n1=b.entries.filter(e=>e.type==='note1').map(e=>e.text).join('; ');const n2=b.entries.filter(e=>e.type==='note2').map(e=>e.text).join('; ');const n3=b.entries.filter(e=>e.type==='note3').map(e=>e.text).join('; ');const dt=b.detailText||'';const bc=b.borderColor||'';s+=`    ${k} | ${b.light.toUpperCase()}${pri}: ${b.label}${sf?' \u2014 Notes 1: '+sf:''}${nt?' \u2014 Notes: '+nt:''}${n1?' \u2014 Notes1: '+n1:''}${n2?' \u2014 Notes2: '+n2:''}${n3?' \u2014 Notes3: '+n3:''}${dt?' \u2014 Detail: '+dt:''}${bc?' \u2014 Border: '+bc:''}\n`;});});}});}else{const sp=SP.find(p=>p.id===currentPage);if(sp){s+=`\nCurrent subpage [${sp.label} (id:${sp.id}, type:${sp.pageType||'this_then'})]:\n`;if(sp.pageType==='how'&&sp.howBoxes){sp.howBoxes.forEach(hb=>{const k=`${sp.id}-${hb.id}`;const b=B[k];if(!b)return;const pri=b.priority?` [Pri:${b.priority}]`:'';const sf=b.entries.filter(e=>e.type==='sofar').map(e=>e.text).join('; ');const nt=b.entries.filter(e=>e.type==='note').map(e=>e.text).join('; ');const n1=b.entries.filter(e=>e.type==='note1').map(e=>e.text).join('; ');const n2=b.entries.filter(e=>e.type==='note2').map(e=>e.text).join('; ');const n3=b.entries.filter(e=>e.type==='note3').map(e=>e.text).join('; ');const dt=b.detailText||'';const bc=b.borderColor||'';s+=`    ${k} | ${b.light.toUpperCase()}${pri}: ${b.label}${sf?' \u2014 Notes 1: '+sf:''}${nt?' \u2014 Notes: '+nt:''}${n1?' \u2014 Notes1: '+n1:''}${n2?' \u2014 Notes2: '+n2:''}${n3?' \u2014 Notes3: '+n3:''}${dt?' \u2014 Detail: '+dt:''}${bc?' \u2014 Border: '+bc:''}\n`;});}else{sp.cols.forEach((col,ci)=>{s+=`  Column ${ci+1}: "${col.h}"\n`;col.boxes.forEach((_,bi)=>{const k=`${sp.id}-c${ci}-b${bi}`;const b=B[k];if(!b)return;const pri=b.priority?` [Pri:${b.priority}]`:'';const sf=b.entries.filter(e=>e.type==='sofar').map(e=>e.text).join('; ');const nt=b.entries.filter(e=>e.type==='note').map(e=>e.text).join('; ');const n1=b.entries.filter(e=>e.type==='note1').map(e=>e.text).join('; ');const n2=b.entries.filter(e=>e.type==='note2').map(e=>e.text).join('; ');const n3=b.entries.filter(e=>e.type==='note3').map(e=>e.text).join('; ');const dt=b.detailText||'';const bc=b.borderColor||'';s+=`    ${k} | ${b.light.toUpperCase()}${pri}: ${b.label}${sf?' \u2014 Notes 1: '+sf:''}${nt?' \u2014 Notes: '+nt:''}${n1?' \u2014 Notes1: '+n1:''}${n2?' \u2014 Notes2: '+n2:''}${n3?' \u2014 Notes3: '+n3:''}${dt?' \u2014 Detail: '+dt:''}${bc?' \u2014 Border: '+bc:''}\n`;});});}}s+=`\nOther subpages (say "whole board" to see full detail):\n`;SP.filter(p=>p.id!==currentPage).forEach(sp=>{const ks=Object.keys(B).filter(k=>k.startsWith(sp.id+'-'));const g=ks.filter(k=>B[k].light==='green').length;s+=`  ${sp.label} (${sp.id}, type:${sp.pageType||'this_then'}): ${ks.length} boxes, ${g} green\n`;});}s+=`\nFinal Outcomes:\n`;FO_DATA.forEach((label,i)=>{const b=B[`final-b${i}`];if(!b)return;s+=`  final-b${i} | ${b.light.toUpperCase()}: ${label}\n`;});s+=`\nBoard info: ${boardInfo||'(empty)'}\n`;s+=`\nPage info:\n`;SP.forEach(sp=>{const pi=pageInfo[sp.id]||'';if(pi)s+=`  ${sp.label} (${sp.id}): ${pi}\n`;});const fpi=pageInfo['final']||'';if(fpi)s+=`  Final Outcomes (final): ${fpi}\n`;const opi=pageInfo['overview']||'';if(opi)s+=`  Overview (overview): ${opi}\n`;const _bspDcKeys=Object.keys(docContent).filter(k=>docContent[k]);if(_bspDcKeys.length){s+='\nDocumentation page content:\n';_bspDcKeys.forEach(pid=>{const _dsp=SP.find(s2=>s2.id===pid);const _dlbl=_dsp?_dsp.label:pid;s+='  '+_dlbl+' ('+pid+'): '+docContent[pid].replace(/<[^>]*>/g,' ').substring(0,500)+'\n';});}if(ttLinks.length){s+='\nThis\u2013Then Links:\n';ttLinks.forEach(l=>{const fb=B[l.from];const tb=B[l.to];if(fb&&tb)s+=`  ${l.from} -> ${l.to} (${fb.label} -> ${tb.label})\n`;});}if(measures.length){s+='\nMeasures:\n';measures.forEach(m=>{const cnt=getBoxesLinkedToMeasure(m.id).length;s+='  '+m.id+': '+m.title+' ('+cnt+' associated)\n';});}if(evalQuestions.length){s+='\nEvaluation Questions:\n';evalQuestions.forEach(q=>{const cnt=getBoxesLinkedToEQ(q.id).length;s+='  '+q.id+': '+q.questionText+' ('+cnt+' associated)\n';});}if(howLinks.length){s+='\nHow Links:\n';howLinks.forEach(l=>{const fb=B[l.from];const tb=B[l.to];if(fb&&tb)s+=`  ${l.id}: ${l.from} -> ${l.to} (${fb.label} -> ${tb.label})\n`;});}s+=`\nYou can modify the board by including action commands in your response. Commands use the format [ACTION:command:arg1:arg2:...] on their own line.\nIMPORTANT: When talking to the user, refer to columns as Column 1, Column 2, etc. (1-based). In ACTION commands, use 0-based COLUMN_INDEX (Column 1 = index 0, Column 2 = index 1, etc.).\nIMPORTANT: ALWAYS include ACTION tags directly in your response for ANY board change. NEVER describe a change without including the ACTION tag. The JavaScript handles confirmation automatically for structural changes. EXCEPTION: if the user is only asking a question or asking for an explanation, do NOT emit ACTION tags. If the user's page-creation request is ambiguous (no page type specified, no populated trigger), do NOT emit any ACTION tag \u2014 instead ask the page-type clarification question and wait.\nIMPORTANT: For structural changes (addBox, removeBox, addColumn, etc.), use FUTURE TENSE in your explanation because the user must confirm before the change takes effect. Say "A new box will be added" NOT "A new box has been added". Say "This column will be removed" NOT "This column has been removed". The confirmation dialog appears automatically \u2014 do NOT ask for permission in plain text.\n\nAvailable commands:\nState changes (execute immediately \u2014 use past tense: "Done", "Changed", etc.):\n  [ACTION:setLight:BOX_ID:COLOR] \u2014 set traffic light (green/greenYellow/yellow/yellowRed/red/grey)\n  [ACTION:setAllLights:COLOR] \u2014 set ALL boxes to a color\n  [ACTION:setSubpageLights:SUBPAGE_ID:COLOR] \u2014 set all boxes on a subpage\n  [ACTION:addSofar:BOX_ID:TEXT] \u2014 append a Notes 1 entry\n  [ACTION:addNote:BOX_ID:TEXT] \u2014 append a My Notes entry\n  [ACTION:addNote1:BOX_ID:TEXT] \u2014 append a Notes 1 entry\n  [ACTION:addNote2:BOX_ID:TEXT] \u2014 append a Notes 2 entry\n  [ACTION:addNote3:BOX_ID:TEXT] \u2014 append a Notes 3 entry\n  [ACTION:setPriority:BOX_ID:PRIORITY] \u2014 set priority (A/B/C/D/E/BAU or empty to clear)\n  [ACTION:clearEntries:BOX_ID:TYPE] \u2014 clear entries (sofar/note/note1/note2/note3/all)\n  [ACTION:setDetail:BOX_ID:TEXT] \u2014 set detail text box below a box (always visible on board)\n  [ACTION:clearDetail:BOX_ID] \u2014 remove detail text box\n  [ACTION:setBoxBorder:BOX_ID:COLOR] \u2014 set custom border color (2px, e.g. red, #ef4444)\n  [ACTION:clearBoxBorder:BOX_ID] \u2014 reset border to default\n  [ACTION:setSubpageBorders:SUBPAGE_ID:COLOR] \u2014 set all box borders on a subpage\n  [ACTION:clearSubpageBorders:SUBPAGE_ID] \u2014 reset all borders on a subpage\n  [ACTION:setBoardInfo:TEXT] \u2014 replace Board info content with TEXT\n  [ACTION:setPageInfo:PAGE_ID:TEXT] \u2014 replace Page info for PAGE_ID (e.g. p1, p2, final, overview) with TEXT\n\nStructural changes (user confirms before executing \u2014 use FUTURE TENSE in explanation):\n  [ACTION:addBox:SUBPAGE_ID:COLUMN_INDEX:LABEL]\n  [ACTION:removeBox:BOX_ID]\n  [ACTION:renameBox:BOX_ID:NEW_LABEL]\n  [ACTION:addColumn:SUBPAGE_ID:COLUMN_INDEX:HEADING]\n  [ACTION:removeColumn:SUBPAGE_ID:COLUMN_INDEX]\n  [ACTION:renameColumn:SUBPAGE_ID:COLUMN_INDEX:NEW_HEADING]\n  [ACTION:moveColumn:SUBPAGE_ID:FROM_INDEX:TO_INDEX] \u2014 move a column from one position to another (0-based indexes)\n  [ACTION:addSubpage:LABEL:PAGE_TYPE] \u2014 adds subpage. PAGE_TYPE is this_then, how, or documentation (default: this_then). When the user asks to add a page without a clear type and without a populated trigger, ASK the page-type clarification question before emitting this command.\n  [ACTION:removeSubpage:SUBPAGE_ID]\n  [ACTION:addFinalOutcome:LABEL]\n  [ACTION:removeFinalOutcome:INDEX]\n\nHow Page commands (structural \u2014 user confirms):\n  [ACTION:addHowBox:SUBPAGE_ID:LABEL] \u2014 add a How Box to a How page\n  [ACTION:removeHowBox:SUBPAGE_ID:HOW_ID] \u2014 remove a How Box (e.g. H001)\n  [ACTION:renameHowBox:SUBPAGE_ID:HOW_ID:NEW_LABEL] \u2014 rename a How Box\n\nThis\u2013Then Link commands (state changes \u2014 execute immediately):\n  [ACTION:addTTLink:FROM_BOX_ID:TO_BOX_ID] \u2014 add a This\u2013Then link between two This\u2013Then boxes (same or cross-page). Max one link per direction between a pair.\n  [ACTION:removeTTLink:LINK_ID] \u2014 remove a BPAGE_ID-HXXX (e.g. p2-H001). State commands (setLight, addSofar, etc.) work on How Boxes using these IDs.\n- If the user is asking a question, asking for an explanation, asking "what does this board say about\u2026", asking for advice, or asking for a summary, answer in plain language. Do NOT propose structural edits unless the user clearly asks for a change.`;return s;}

// helpers for the temporary source-reference box.
function getSourcePageId(key){if(!key)return null;if(key.startsWith('final-'))return 'final';var idx=getRuntimeLinkIndex();var sp=idx.pageByKey[key];if(sp&&sp.id)return sp.id;var tt=parseTTBoxKey(key);if(tt)return tt.spId;var hm=parseHowBoxKey(key);if(hm)return hm.spId;return null;}

// setSourceRefBox now also records the navType that caused it ('jump' for explicit jump-affordance use, 'inspect' for link-inspection / relationship-navigation use). The rendered heading varies accordingly. A 'returned' flag is initialised false; it is flipped to true only by navBackToSource so the renderer can switch the heading to 'Box currently highlighted on this page' while the user is back on the source page.
function setSourceRefBox(sourceKey,navType){var srcBox=B[sourceKey];var srcPid=getSourcePageId(sourceKey);if(!srcBox||!srcPid)return;sourceRefBox={sourceKey:sourceKey,sourcePageId:srcPid,sourceLabel:srcBox.label||'',sourceColor:getBoxColorForSourceRef(sourceKey),navType:(navType==='jump'||navType==='inspect')?navType:'inspect',returned:false};}
// ONE shared helper through which every explicit cross-page relationship-navigation route creates the ghost/context box. This ensures the context box appears consistently for: (a) popup linked-item click, (b) jump, (c) border-click reveal continuation across pages, (d) count-affordance cancel/continue cross-page continuation. Ordinary manual tab switching does NOT call this helper (and must not) \u2014 the check in navTo that invokes it is gated on an active inspect context (inspectHome), i.e. only when there is a genuine explicit relationship-navigation state to carry. Also preserves the already-established heading logic for the different navType modes ('jump' vs 'inspect'), and avoids churn by not recreating the sourceRefBox if the same source is already pinned and still active.
function ensureSourceRefBoxForCrossPage(sourceKey,targetPageId,navType){if(!sourceKey)return;var srcPid=getSourcePageId(sourceKey);if(!srcPid||srcPid===targetPageId)return;var wantType=(navType==='jump'||navType==='inspect')?navType:'inspect';if(sourceRefBox&&sourceRefBox.sourceKey===sourceKey&&sourceRefBox.navType===wantType&&!sourceRefBox.returned)return;setSourceRefBox(sourceKey,wantType);}
function dismissSourceRef(){sourceRefBox=null;inspectHome=null;inspectLinkedKeys=[];render();}
// returning to the original source page via the context box now (a) highlights the source box with the strong home-style highlight used elsewhere for selected/home boxes (inspectHome), (b) scrolls it into view if necessary, and (c) keeps the context box visible on the source page with the heading 'Box currently highlighted on this page'. It preserves grey linked-box context as secondary context. Uses the navigation history push pattern so the far-left back/forward arrows work naturally after a return.
function navBackToSource(){if(!sourceRefBox)return;var key=sourceRefBox.sourceKey;var pid=sourceRefBox.sourcePageId;if(currentPage!==pid){navHistory.push(currentPage);if(navHistory.length>MAX_NAV_HIST)navHistory.shift();navFuture=[];currentPage=pid;openBox=null;editingType=null;var _ep=document.getElementById('epWrap');if(_ep)_ep.style.display='none';}sourceRefBox.returned=true;inspectHome=key;inspectLinkedKeys=[];render();setTimeout(function(){var el=document.getElementById('bx-'+key);if(el)el.scrollIntoView({behavior:'smooth',block:'center'});},150);}

// render the temporary source-reference box. Heading depends on mode: on the destination page after a jump it reads 'Box jumped from'; on the destination page after a link-inspection / relationship-navigation cross-page hop it reads 'Box on other page linking to highlighted boxes below'; on the source page after the user has returned via the context box it reads 'Box currently highlighted on this page'. The return-to-source variant is the ONLY case in which the context box appears on the source page \u2014 ordinary manual tab navigation does not trigger it.
// the ghost/context-box lifecycle is now treated as ONE coherent system, not a set of ad-hoc cases.
//   (a) Activation \u2014 inspect mode is entered by border-click (line ~700) or count-click (showTTLinksList /
//       showHowCountList / showWhyCountList / showDownwardHowList / showLateralHowList / showLateralHowOnTTList).
//       In all of those entry points, setSourceRefBox(key,'inspect') is called so the ghost/context box appears
//       IMMEDIATELY on the source page with the heading 'Showing links for this box on this page'.
//   (b) Persistence within the active context \u2014 the sourceRefBox object is kept alive across page navigation so
//       long as the inspect context (inspectHome / inspectLinkedKeys) remains active. Returning to a relevant
//       page (by clicking the link in the ghost/context box, by the in-pane inspectNavTo, or by the back/forward
//       page arrows) shows the ghost/context box again with the correct heading.
//   (c) On-page relevance \u2014 the ghost/context box appears ONLY on pages that are part of the active link/
//       navigation context: the source page itself, or any page containing at least one box in
//       inspectLinkedKeys. On pages with no relevant linked boxes it is hidden (but not cleared), so navigating
//       back into the context restores it.

//       active; 'Box on other page linking to highlighted boxes below' on a relevant destination page
//       after an inspect-mode hop; 'Box jumped from' on a destination page after a jump; 'Box currently
//       highlighted on this page' when the user has explicitly returned to the source page via the ghost/context
//       box link.

//       clicking empty board space (existing listener), or an unrelated new inspect all clear the ghost/context
//       box along with inspectHome / inspectLinkedKeys.
// Jump mode (navType 'jump') is unchanged in meaning; it only changes the heading on the destination page.
function pageContainsAnyKey(pid,keys){if(!keys||!keys.length)return false;for(var i=0;i<keys.length;i++){if(getSourcePageId(keys[i])===pid)return true;}return false;}
function renderSourceRefBox(){var main=document.getElementById('main');if(!main)return;var existing=document.getElementById('srcRefBox');if(existing)existing.remove();if(!sourceRefBox)return;var curPt=_currentPageType();if(currentPage==='final'||curPt==='documentation')return;var srcPid=sourceRefBox.sourcePageId;var srcPageExists=(srcPid==='final')||(srcPid==='overview')||!!SP.find(function(s){return s.id===srcPid;});if(!srcPageExists){sourceRefBox=null;return;}
  // on-page relevance check. The ghost/context box should appear only where the user is still
  // inside the active link/navigation context. That means: on the source page itself, or on a destination page

  if(!onSourcePage&&!persistentInspect&&!contextPageHasRelevantBox&&!isJumpDest)return;

  if(navType==='jump'&&!onSourcePage){heading='Box jumped from';}
  else if(isHowBox(sourceRefBox.sourceKey)){heading='Selected How Box for linking';}
  else if(isTTBox(sourceRefBox.sourceKey)){heading='Selected This–Then Box for linking';}
  else{heading='Selected box for linking';}
  var liveSourceBox=B[sourceRefBox.sourceKey];var liveSourceLabel=liveSourceBox?liveSourceBox.label:(sourceRefBox.sourceLabel||'');if(liveSourceBox)sourceRefBox.sourceLabel=liveSourceLabel;var sourceColor=liveSourceBox?getBoxColorForSourceRef(sourceRefBox.sourceKey):(sourceRefBox.sourceColor||{bg:'#eef6ff',bdr:'#60a5fa'});sourceColor=sanitizeColorObject(sourceColor,{bg:'#eef6ff',bdr:'#60a5fa',tab:'#60a5fa'});sourceRefBox.sourceColor=sourceColor;
  var div=document.createElement('div');div.id='srcRefBox';div.className='src-ref-box';div.style.background=sourceColor.bg;div.style.borderColor=sourceColor.bdr;div.innerHTML='<div class="src-ref-label">'+escHtml(heading)+'</div><div class="src-ref-content" onclick="navBackToSource()" title="Return to source box">'+escHtml(liveSourceLabel||'')+'</div>'+sourceRefAffordanceHTML(sourceRefBox.sourceKey)+'<span class="src-ref-close" onclick="dismissSourceRef()" title="Dismiss">\u2715</span>';main.appendChild(div);
}

// popup for the TT lateral affordance \u2014 shows level-2+ How Boxes with Cross-Links to this TT box.

function hasSelectableLateralHowPopupTarget(key){var fromLvl=getHowPageLevel(key);var found=false;SP.forEach(function(sp){if(found)return;if(sp.pageType==='how'&&sp.howBoxes){var spLvl=sp.howLevel;if(fromLvl!==null&&fromLvl!==undefined&&spLvl!==null&&spLvl!==undefined){if(spLvl===fromLvl-1||spLvl===fromLvl+1)return;}sp.howBoxes.forEach(function(hb){if(found)return;var k=sp.id+'-'+hb.id;if(k===key)return;var b=B[k];if(!b)return;if(existingHowLinkForPair(key,k))return;found=true;});}else if((sp.pageType||'this_then')==='this_then'){if(fromLvl===null||fromLvl===undefined||fromLvl===1)return;sp.cols.forEach(function(col,ci){if(found)return;col.boxes.forEach(function(_,bi){if(found)return;var k=sp.id+'-c'+ci+'-b'+bi;var b=B[k];if(!b)return;if(existingHowLinkForPair(key,k))return;found=true;});});}});return found;}

function buildLateralHowOnTTPopupPicker(ttKey){var opts='<option value="">Select a How Box\u2026</option>';SP.forEach(function(sp){if(sp.pageType!=='how'||!sp.howBoxes)return;var boxOpts='';sp.howBoxes.forEach(function(hb){var k=sp.id+'-'+hb.id;var b=B[k];if(!b)return;/* only offer How Boxes whose link to this TT box would classify as lateral (Cross-Link). Level-1 How\u2192TT is hierarchical, so Level-1 boxes are excluded. Level-2+ and no-level How Boxes are offered. */var fromLvl=getHowPageLevel(k);if(fromLvl===1)return;/* skip if link already exists */if(getHowLinkExact(k,ttKey))return;boxOpts+='<option value="'+k+'">'+_howBoxOptionLabel(hb,b)+'</option>';});if(boxOpts)opts+='<optgroup label="'+escAttr(sp.label)+'">'+boxOpts+'</optgroup>';});return '<div class="how-link-add"><select class="how-link-sel" id="ttLatHowPopupPicker">'+opts+'</select><button class="how-link-abtn" onclick="addLateralHowOnTTFromPopup(\''+ttKey+'\')">Add</button></div>';}

)" onclick="closeModal(\'howCountListModal\')">Close</button>';openModal('howCountListModal');}

// ─── HOW LINK LEVEL CLASSIFICATION — strict adjacency ───
// only adjacent How-levels are hierarchical, and only Level-1 How→This–Then counts as hierarchical.
//        Anything else (same-level, skipped-level, Level-2+→TT, no-level) is lateral.
function getHowPageLevel(key){var idx=getRuntimeLinkIndex();return Object.prototype.hasOwnProperty.call(idx.howLevelByKey,key)?idx.howLevelByKey[key]:null;}
function howBoxHasVerticalLevel(key){var lvl=getHowPageLevel(key);return lvl!==null&&lvl!==undefined;}
function currentHowPageHasVerticalLevel(){var sp=SP.find(function(s){return s.id===currentPage&&s.pageType==='how';});return !!(sp&&sp.howLevel!==null&&sp.howLevel!==undefined);}
function classifyHowLink(fromKey,toKey){
  if(isTTBox(toKey)){
    // Only Level-1 How Boxes may hierarchically link to This–Then Boxes.
    const fromLvl=getHowPageLevel(fromKey);
    if(fromLvl===1)return 'upward';
    return 'lateral';
  }
  if(!isHowBox(toKey))return 'lateral';
  const fromLvl=getHowPageLevel(fromKey);const toLvl=getHowPageLevel(toKey);
  if(fromLvl===null||fromLvl===undefined||toLvl===null||toLvl===undefined)return 'lateral';
  if(isSamePageHow(fromKey,toKey))return 'lateral';
  // Strict adjacency — only ±1 level counts as hierarchical.
  if(toLvl===fromLvl-1)return 'upward';
  if(toLvl===fromLvl+1)return 'downward';
  return 'lateral';
}
function getUpwardHowCount(key){return getHowLinksFrom(key).filter(l=>classifyHowLink(l.from,l.to)==='upward').length;}
// bottom (downward) affordance on a How Box now counts ALL hierarchical links

// This keeps counts consistent on both source and target sides of any hierarchical link.
function getDownwardHowCount(key){return getHowLinksTouching(key).filter(l=>_storedHowLinkClass(l)!=='lateral'&&((l.from===key&&classifyHowLink(l.from,l.to)==='downward')||(l.to===key&&classifyHowLink(l.from,l.to)==='upward'))).length;}
function getLateralHowCount(key){return getHowLinksTouching(key).filter(l=>_storedHowLinkClass(l)==='lateral').length;}

async function sendChat(){const inp=document.getElementById('chatIn');const msg=inp.value.trim();if(!msg)return;inp.value='';if(msg.toLowerCase()==='undo'){doUndo();return;}addChatMsg('user',msg);if(!aiSettings.endpoint){addChatMsg('system','Board Chat needs a configured AI endpoint before it can send messages.\n\nYou can still use this DoView Board without Board Chat. If you are using Claude or another AI system, put this board into the main chat and ask it to answer questions about the board or help you change it.');maybeProbeConnection();return;}if(!aiSettings.key){addChatMsg('system','Board Chat needs the API key or session credential for the configured endpoint before it can send messages. API keys are session-only and are not saved by the board.');maybeProbeConnection();return;}addThinking();const history=chatMsgs.slice(-10).filter(m=>m.role!=='system').map(m=>({role:m.role==='asst'?'assistant':m.role,content:m.text}));const wantsFull=/whole board|all pages|across the board|every page|every subpage|all subpages/i.test(msg);const wantsStructural=/add.*(page|subpage|box|column|how)|create|build|new page|new subpage|restructure|how page|how box/i.test(msg);const sysPmt=buildBoardStatePrompt(wantsFull,wantsStructural);
  try{const r=await fetch(aiSettings.endpoint,{method:'POST',headers:{'Content-Type':'application/json','Authorization':`Bearer ${aiSettings.key}`},body:JSON.stringify({model:aiSettings.model||'gpt-4o',messages:[{role:'system',content:sysPmt},...history],max_tokens:1200})});if(r.ok){const d=await r.json();const raw=d.choices?.[0]?.message?.content||'';if(raw){const clean=processAIResponse(raw,msg);if(clean){addChatMsg('asst',clean);chatMsgs[chatMsgs.length-1].role='asst';}}removeThinking();}else{removeThinking();addChatMsg('system','API error. Check your settings.');}}catch(e){removeThinking();addChatMsg('system','Connection error. Check settings.');}}

function applySavedBoxState(state){
  var nested=(state&&state.B&&typeof state.B==='object'&&!Array.isArray(state.B))?state.B:null;
  var records=nested||state||{};
  Object.entries(records).forEach(([k,v])=>{if(B[k])Object.assign(B[k],v);else if(nested)B[k]=v;});
  Object.values(B).forEach(b=>{if(!Array.isArray(b.entries))b.entries=[];if(!b.detailText)b.detailText='';if(!b.borderColor)b.borderColor='';if(!Array.isArray(b.measures))b.measures=[];if(!Array.isArray(b.evalQuestions))b.evalQuestions=[];});
}
function init(config) {
  _doviewInitCalled = true;
  TITLE = config.title || 'DoView Board';
  SLUG = config.slug || 'doview_board';
  builderValidation = config.builderValidation && typeof config.builderValidation === 'object' ? config.builderValidation : null;
  // ensure fresh boards get a unique slug to prevent localStorage collisions
  if (!config.savedState && !EMBEDDED_STATE) { SLUG = SLUG + '_' + Date.now().toString(36); }
  SP = config.subpages || [];
  FO_DATA = normalizedFinalOutcomes(config.finalOutcomes || []);
  sources = config.sources || [];
  const savedState = config.savedState || null;

  // set the read-only flag early, based on savedState.isReadonly. This is how a Read-only copy HTML file identifies itself to the engine on load. Only the embedded savedState can set this \u2014 it is not settable at runtime from the UI. Normal editable boards leave IS_READONLY as false.
  IS_READONLY = !!(savedState && savedState.isReadonly === true);

  // Inject CSS
  const style = document.createElement('style');
  style.textContent = CSS;
  document.head.appendChild(style);

  // Set page title
  document.title = IS_READONLY ? (TITLE + ' \u2014 Read-only copy') : TITLE;

  // Inject HTML
  document.body.innerHTML = buildHTML(TITLE);
  applyPresentationView();
  // Apply the is-readonly class to <body> so the CSS rules can hide edit-oriented controls (chat FAB and panel, ep-Wrap, Update-to-Main-AI-Chat / Create-New-Empty-Board / Create-Read-Only-Copy buttons, Sources Add/Save buttons, measure/EQ/link add/remove controls, doc-page edit toolbar, page-info move/delete/undo controls, etc.). The read-only label, now on the right-hand side of the top bar and sized as a clear mode/state label, becomes visible via the same class.
  if (IS_READONLY) document.body.classList.add('is-readonly');

  // Build state
  buildInitialState();
  buildDepsMap();

  // Apply saved state if provided
  if (savedState) {
    if (savedState.B && savedState.SP) {
      SP.length = 0; savedState.SP.forEach(s => SP.push(s));
      FO_DATA.length = 0; normalizedFinalOutcomes(savedState.FO || []).forEach(f => FO_DATA.push(f));
      B = {}; buildInitialState(); buildDepsMap();
    }
    applySavedBoxState(savedState);
    if (savedState.boardInfo) boardInfo = savedState.boardInfo;
    if (savedState.pageInfo) pageInfo = savedState.pageInfo;
    if (savedState.docContent) docContent = sanitizeDocContentObject(savedState.docContent);
    if (savedState.createdDate) createdDate = savedState.createdDate;
    if (savedState.boardInstanceId) boardInstanceId = savedState.boardInstanceId;
    if (savedState.ttLinks) ttLinks = savedState.ttLinks;

    "boardInfo": "This is a deliberately complex example DoView Board. It demonstrates the strengthened V1.2.6 natural-shape, terminal-column guardrail, near-match, and causal-connectivity guidance: a substantial topic is decomposed into distinct domains, causal pathways, implementation workstreams, measures, evaluation questions, and documentation notes without forcing every This–Then page into the same geometry or leaving causal boxes as disconnected inventory items. It is illustrative only and does not use public research. A real board should replace generic assumptions with local evidence and community input.",
    "pageInfo": {
      "overview": "Reference example only. The varied page geometry is intentional: each page is shaped by its causal domain rather than a repeated grid.",
      "p1": "Needs and assets are not treated as a neat four-column pathway because discovery, agreement, and targeting are uneven work.",
      "p2": "Household access uses a longer pathway because barriers, affordable choices, stress, and wellbeing are distinct stages.",
      "p3": "Supply reliability uses more stages because production, safeguards, continuity, dependable supply, and resilience are different causal moves.",
      "p4": "Distribution and service integration is deliberately narrower: the logic turns on roles, routines, and joined-up support.",
      "p5": "Participation combines leadership, skills, sustained participation, and ownership.",
      "p6": "Governance and learning includes accountability, resources, learning, adaptation, and viability.",
      "p7": "How page with implementation workstreams only. Links point upward to relevant This–Then outcomes.",
      "p8": "Documentation page for assumptions, evidence notes, and learning guidance."
    },
    "docContent": {
      "p8": "<h2>Purpose of this example</h2>\n<p>This Documentation page shows how a complex DoView Board can keep longer explanation outside compact boxes while still keeping the final board as one standalone HTML file.</p>\n<h2>Natural-shape note</h2>\n<p>The This–Then pages deliberately use different numbers of columns and boxes because the domains differ. This is not random irregularity: the need-mapping pathway is shorter, the supply pathway is longer, and governance has its own learning and sustainability sequence.</p>\n<h2>Assumptions to replace in a real board</h2>\n<ul>\n<li>Local food need, assets, and constraints should be checked with local evidence.</li>\n<li>Priority groups should be defined with community input and privacy safeguards.</li>\n<li>Measures should be refined so they are useful and not burdensome.</li>\n<li>Partner capacity and volunteer load should be reviewed before scaling.</li>\n</ul>\n<h2>Learning cycle</h2>\n<p>Use the measures and evaluation questions to revise workstreams, not just report activity. Evidence notes should be added close to the claims they support.</p>",
      "p9": "<h1>Using DoView Boards and Disclaimer</h1>\n<p>See the disclaimer section below.</p>\n<p>The DoView Board prompt and the DoView Board built within this DoView Board prototype app are provided free of charge so that anyone can experiment with DoView Boards and explore for themselves how they can answer the 20 key questions that anyone running or overseeing an organization needs to answer. See <a href=\"https://doviewplanning.org/doviewboardsuse\" target=\"_blank\" rel=\"noopener noreferrer\">https://doviewplanning.org/doviewboardsuse</a>.</p>\n<h2>Walk-Through</h2>\n<p>To get a walk-through for using DoView Boards, see <a href=\"https://doviewplanning.org/walkthrough\" target=\"_blank\" rel=\"noopener noreferrer\">https://doviewplanning.org/walkthrough</a>.</p>\n<h2>Accessing Consulting or Training</h2>\n<p>We can provide consulting or training on integrating the use of DoView Boards into your existing planning, implementation and reporting workflows in business, government, or nonprofit settings. See <a href=\"https://doviewplanning.org/offerings\" target=\"_blank\" rel=\"noopener noreferrer\">https://doviewplanning.org/offerings</a>.</p>\n<h2>Adapting the DoView Board Prototype App to your setting</h2>\n<p>This DoView Board is being used within the DoView Board prototype app. It is a free of charge app that runs inside any browser window and can be used for piloting, testing, proof-of-concept and for use where confidential information is not being included and where there is a low security risk.</p>\n<p>The DoView Board app is an open-source developer project under an Apache-2.0 open-source license. See <a href=\"https://github.com/DoViewPlanning/doview-boards\" target=\"_blank\" rel=\"noopener noreferrer\">https://github.com/DoViewPlanning/doview-boards</a>. The wider DoView Planning methodology and DoView® trademarks are governed separately. See <a href=\"https://doviewplanning.org/trademarkuse\" target=\"_blank\" rel=\"noopener noreferrer\">https://doviewplanning.org/trademarkuse</a>.</p>\n<p>Because it is an open-source project, any developer can extend, harden, adapt, or include features of the DoView Board app in other planning products or systems to suit specific deployment requirements. For example, adding enhanced stability, scalability, security, authentication, data handling, or integration features needed for production use, sensitive content, or higher-security environments. If you are looking to deploy DoView Boards in a live operational setting, you can work with any developer to tailor the app to your needs. You can also get in touch with us for advice and methodological input into the best way for you to adapt and extend your use of DoView Boards in your particular setting. <a href=\"https://doviewplanning.org/contact\" target=\"_blank\" rel=\"noopener noreferrer\">https://doviewplanning.org/contact</a>.</p>\n<h2>Disclaimer</h2>\n<p>DoView Boards are provided for planning and illustrative purposes only. The content of any DoView Board does not constitute professional advice of any kind, including but not limited to legal, financial, medical, strategic, or organizational advice. No warranty is given as to the accuracy, completeness, or fitness for purpose of any content. The usual precautions for AI-generated material need to be taken. Dr Paul Duignan, DoViewPlanning.org, The Ideas Web Ltd, DoView Corporation Ltd and any associated parties accept no liability whatsoever for any loss, damage, or adverse outcome arising directly or indirectly from the use of, or reliance on, any DoView Board or its contents. Use entirely at your own risk.</p>\n<p>Please note that this DoView Board is in an interactive HTML file and contains active JavaScript so the board can work. Only open boards from sources you trust. Read-only copies disable editing through the board interface but are not security protection.</p>"
